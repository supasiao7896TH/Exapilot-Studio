                <td style={{padding:'5px 8px',fontWeight:600}}>{name}</td>
                <td style={{padding:'5px 8px',color:'var(--text-2)'}}>{desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    ),
    connect: (
      <div>
        <h3 style={{marginTop:0,color:'var(--primary)'}}>การเชื่อมต่อ Block</h3>
        <div style={{display:'grid',gap:10}}>
          {[
            ['Scale / ทิศทางของสาย','เส้นปกติจะเป็นมุมหักเลี้ยวแบบฉาก 5-Segment'],
            ['เส้นสีเขียว (YES)','จาก AND/OR/CHK TIME เมื่อเงื่อนไขผ่าน'],
            ['เส้นสีแดง (NO)','จาก AND/OR/CHK TIME เมื่อเงื่อนไขไม่ผ่าน — มักวนกลับ'],
            ['เส้นประสีส้ม (REP)','Repetition — วนลูปกลับ block ก่อนหน้า'],
          ].map(([label,desc],i) => (
            <div key={i} style={{background:'var(--surface-2)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)'}}>
              <strong>{label}</strong>
              <div style={{fontSize:12,color:'var(--text-2)',marginTop:3}}>{desc}</div>
            </div>
          ))}
        </div>
        <div style={{background:'#FEF9C3',padding:'10px 14px',borderRadius:8,borderLeft:'3px solid #CA8A04',marginTop:12,fontSize:12.5}}>
          <strong>⚠ เชื่อมต่ออย่างไร:</strong> hover block → คลิก handle (■ สี่เหลี่ยม) ที่ขอบล่าง → เคลื่อนไปยัง block ปลายทาง → คลิก handle ขอบบน (▲) เพื่อสร้างเส้น
        </div>
      </div>
    ),
    run: (
      <div>
        <h3 style={{marginTop:0,color:'var(--primary)'}}>การรัน Procedure</h3>
        <div style={{display:'grid',gap:8}}>
          {[
            ['▶ Run','เริ่มรัน procedure — block ที่กำลังทำงานจะกระพริบสีเขียว'],
            ['⏸ Pause','หยุดชั่วคราว — ทำต่อด้วย Resume'],
            ['▶ Resume','รันต่อจากจุดที่หยุด'],
            ['■ Stop','หยุดทันที — ต้องกด Reset ก่อนรันใหม่'],
            ['↺ Reset','ล้างสถานะการรัน — ไม่ลบ procedure'],
            ['Speed','ปรับความเร็วการจำลอง 0.5× ถึง 10×'],
          ].map(([btn,desc],i) => (
            <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',background:'var(--surface-2)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)'}}>
              <code style={{background:'#fff',border:'1px solid var(--border)',padding:'2px 8px',borderRadius:5,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,fontSize:12}}>{btn}</code>
              <span style={{fontSize:12.5,color:'var(--text-2)'}}>{desc}</span>
            </div>
          ))}
        </div>
        <div style={{background:'var(--ok-soft)',padding:'10px 14px',borderRadius:8,borderLeft:'3px solid var(--ok)',marginTop:12,fontSize:12.5}}>
          <strong>สถานะสี Block ระหว่างรัน:</strong><br/>
          🟢 กำลังทำงาน (Processing) &nbsp;|&nbsp; 🟡 หยุดชั่วคราว (Paused) &nbsp;|&nbsp; ⬜ เสร็จแล้ว (Finished)
        </div>
      </div>
    ),
    keys: (
      <div>
        <h3 style={{marginTop:0,color:'var(--primary)'}}>คีย์ลัด</h3>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <tbody>
            {[
              ['Delete / Backspace','ลบ block ที่เลือก'],
              ['Escape','ยกเลิกการเชื่อมต่อ / ยกเลิกการเลือก'],
              ['Scroll Wheel','Zoom in / out บน canvas'],
              ['Drag canvas (พื้นที่ว่าง)','Pan เลื่อนมุมมอง'],
              ['Drag block','ย้าย block'],
              ['Click block','เลือก block (แสดง Properties)'],
              ['Click เส้นเชื่อม','ลบเส้นเชื่อม (มี confirm)'],
            ].map(([key,desc],i) => (
              <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'6px 8px'}}><code style={{background:'var(--surface-3)',padding:'2px 7px',borderRadius:5,fontWeight:700,fontSize:11.5,border:'1px solid var(--border)'}}>{key}</code></td>
                <td style={{padding:'6px 8px',color:'var(--text-2)'}}>{desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    ),
  };

  return (
    <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{width:600,maxWidth:'95vw',maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
        <div className="modal-head">
          <div className="mh-ico">{Icon.help}</div>
          <div>
            <div className="mh-type">คู่มือการใช้งาน</div>
            <div className="mh-title">Exapilot Studio — Help & Reference</div>
          </div>
          <button onClick={onClose} style={{marginLeft:'auto',background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:7,padding:'5px 10px',cursor:'pointer',fontSize:13}}>✕ ปิด</button>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--surface-2)'}}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
                    style={{flex:1,padding:'10px 6px',border:'none',borderBottom:`2px solid ${tab===t.id ? 'var(--primary)' : 'transparent'}`,
                            background:'transparent',fontWeight:600,fontSize:11.5,color:tab===t.id?'var(--primary)':'var(--text-muted)',cursor:'pointer'}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'18px 20px'}}>
          {content[tab]}
        </div>
      </div>
    </div>
  );
}

/* ===== Auto-Generate Wizard Modal ===== */
function AutoWizardModal({ onClose, onGenerate }) {
  const STEP_TYPES = [
    { value: 'check_and',      label: '🔍 ตรวจเงื่อนไข AND',   desc: 'ทุกเงื่อนไขต้องผ่าน (YES/NO)' },
    { value: 'check_or',       label: '🔍 ตรวจเงื่อนไข OR',    desc: 'อย่างน้อย 1 เงื่อนไขผ่าน (YES/NO)' },
    { value: 'set_output',     label: '📤 Output to DCS',      desc: 'ส่งค่าตัวเลขไป DCS tag' },
    { value: 'set_mode',       label: '⚙️ Block Mode',         desc: 'เปลี่ยน mode ของ DCS block' },
    { value: 'timer',          label: '⏱️ รอเวลา (Timer)',      desc: 'หน่วงเวลา N วินาที' },
    { value: 'guidance',       label: '💬 Guidance Message',   desc: 'แสดงข้อความแนะนำ operator' },
    { value: 'confirm',        label: '✅ Confirmation',       desc: 'รอ operator กด OK ก่อนดำเนินการ' },
    { value: 'alarm',          label: '🔔 Alarm Message',      desc: 'แสดง alarm (ต้อง acknowledge)' },
    { value: 'parallel_split', label: '⇶ Parallel Split',     desc: 'แยก flow เป็นสาย parallel' },
    { value: 'parallel_join',  label: '⇶ Parallel Join',      desc: 'รวม flow parallel กลับมา' },
  ];
  const genId = () => 'w' + Date.now() + Math.random().toString(36).slice(2, 5);

  const [procName, setProcName] = useState('Auto Procedure');
  const [steps, setSteps] = useState([
    { id: genId(), type: 'check_and', conditions: [{ left: '', op: '>', right: '' }], onNo: 'loop', waitSec: 10 },
    { id: genId(), type: 'set_output', tag: '', value: '' },
  ]);

  const addStep    = () => setSteps(s => [...s, { id: genId(), type: 'set_output', tag: '', value: '' }]);
  const updateStep = (id, patch) => setSteps(s => s.map(st => st.id === id ? { ...st, ...patch } : st));
  const removeStep = (id) => setSteps(s => s.filter(st => st.id !== id));
  const moveStep   = (id, dir) => setSteps(s => {
    const idx = s.findIndex(st => st.id === id);
    const arr = [...s];
    if (dir === 'up'   && idx > 0)              [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
    if (dir === 'down' && idx < arr.length - 1) [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
    return arr;
  });

  const lbl = { display:'block', fontSize:11, fontWeight:700, color:'var(--text-2)', marginBottom:4,
                textTransform:'uppercase', letterSpacing:'.5px', marginTop:8 };
  const inp = { width:'100%', padding:'6px 9px', border:'1px solid var(--border)', borderRadius:6,
                background:'var(--surface-2)', fontSize:12.5, outline:'none', boxSizing:'border-box' };
  const iconBtn = { width:26, height:26, border:'1px solid var(--border)', borderRadius:5, background:'transparent',
                    cursor:'pointer', fontSize:13, display:'inline-flex', alignItems:'center', justifyContent:'center' };

  const renderFields = (step) => {
    switch (step.type) {
      case 'check_and': case 'check_or': return (
        <div>
          <label style={lbl}>เงื่อนไข (Conditions)</label>
          {(step.conditions || []).map((c, i) => (
            <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 64px 1fr 28px',gap:4,marginBottom:4}}>
              <input style={inp} value={c.left} placeholder="Tag เช่น PD-404.PV"
                onChange={e=>{const cs=[...(step.conditions||[])];cs[i]={...cs[i],left:e.target.value};updateStep(step.id,{conditions:cs});}}/>
              <select style={inp} value={c.op}
                onChange={e=>{const cs=[...(step.conditions||[])];cs[i]={...cs[i],op:e.target.value};updateStep(step.id,{conditions:cs});}}>
                {['>','>=','<','<=','==','!='].map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <input style={inp} value={c.right} placeholder="ค่า เช่น 80"
                onChange={e=>{const cs=[...(step.conditions||[])];cs[i]={...cs[i],right:e.target.value};updateStep(step.id,{conditions:cs});}}/>
              <button onClick={()=>{const cs=(step.conditions||[]).filter((_,j)=>j!==i);updateStep(step.id,{conditions:cs});}}
                style={{...iconBtn,color:'var(--err)'}}>✕</button>
            </div>
          ))}
          <button onClick={()=>updateStep(step.id,{conditions:[...(step.conditions||[]),{left:'',op:'>',right:''}]})}
            style={{fontSize:11,color:'var(--primary)',background:'var(--primary-soft)',border:'1px dashed var(--primary)',
                    borderRadius:5,padding:'3px 10px',cursor:'pointer',marginTop:2}}>
            + เพิ่มเงื่อนไข
          </button>
          <label style={lbl}>เมื่อเงื่อนไขไม่ผ่าน (NO Branch)</label>
          <select style={inp} value={step.onNo||'loop'} onChange={e=>updateStep(step.id,{onNo:e.target.value})}>
            <option value="loop">🔁 วนซ้ำ (Loop back) — รอจนกว่าจะผ่าน</option>
            <option value="continue">➡️ ข้ามไปขั้นตอนถัดไป</option>
            <option value="end">🔴 หยุดทำงาน (ไปที่ END)</option>
          </select>
          {(step.onNo==='loop'||!step.onNo)&&(<>
            <label style={lbl}>รอก่อน Retry (วินาที)</label>
            <input type="number" min="1" style={inp} value={step.waitSec||10}
              onChange={e=>updateStep(step.id,{waitSec:Number(e.target.value)})}/>
          </>)}
        </div>
      );
      case 'set_output': return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div><label style={{...lbl,marginTop:0}}>DCS Tag</label>
            <input style={inp} value={step.tag||''} placeholder="เช่น PP-404A.MV"
              onChange={e=>updateStep(step.id,{tag:e.target.value})}/></div>
          <div><label style={{...lbl,marginTop:0}}>ค่าที่ส่ง (Value)</label>
            <input style={inp} value={step.value||''} placeholder="0 หรือ 100"
              onChange={e=>updateStep(step.id,{value:e.target.value})}/></div>
        </div>
      );
      case 'set_mode': return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div><label style={{...lbl,marginTop:0}}>DCS Tag</label>
            <input style={inp} value={step.tag||''} placeholder="เช่น PP-404A"
              onChange={e=>updateStep(step.id,{tag:e.target.value})}/></div>
          <div><label style={{...lbl,marginTop:0}}>Mode</label>
            <select style={inp} value={step.mode||'AUT'} onChange={e=>updateStep(step.id,{mode:e.target.value})}>
              {['MAN','AUT','CAS','O','S','PAU','TRK'].map(m=><option key={m}>{m}</option>)}
            </select></div>
        </div>
      );
      case 'timer': return (
        <div><label style={{...lbl,marginTop:0}}>รอ (วินาที)</label>
          <input type="number" min="1" style={inp} value={step.seconds||10}
            onChange={e=>updateStep(step.id,{seconds:Number(e.target.value)})}/></div>
      );
      case 'guidance': return (
        <div><label style={{...lbl,marginTop:0}}>ข้อความแนะนำ</label>
          <textarea style={{...inp,minHeight:52,resize:'vertical'}} value={step.message||''} placeholder="ข้อความที่จะแสดง operator"
            onChange={e=>updateStep(step.id,{message:e.target.value})}/></div>
      );
      case 'confirm': return (
        <div>
          <label style={{...lbl,marginTop:0}}>หัวข้อ (Title)</label>
          <input style={inp} value={step.title||''} placeholder="Confirm" onChange={e=>updateStep(step.id,{title:e.target.value})}/>
          <label style={lbl}>ข้อความ (Message)</label>
          <textarea style={{...inp,minHeight:52,resize:'vertical',marginTop:4}} value={step.message||''} placeholder="กรุณายืนยันการดำเนินการ"
            onChange={e=>updateStep(step.id,{message:e.target.value})}/>
        </div>
      );
      case 'alarm': return (
        <div>
          <label style={{...lbl,marginTop:0}}>ข้อความ Alarm</label>
          <textarea style={{...inp,minHeight:52,resize:'vertical'}} value={step.message||''} placeholder="ข้อความ alarm"
            onChange={e=>updateStep(step.id,{message:e.target.value})}/>
          <label style={lbl}>Severity</label>
          <select style={{...inp,marginTop:4}} value={step.severity||'HIGH'} onChange={e=>updateStep(step.id,{severity:e.target.value})}>
            <option>LOW</option><option>HIGH</option><option>CRITICAL</option>
          </select>
        </div>
      );
      case 'parallel_split': case 'parallel_join':
        return (
          <div>
            <label style={lbl}>Connection Points (each side)</label>
            <div style={{display:'flex', gap:20, marginTop:4}}>
              {[5, 10].map(n => (
                <label key={n} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontWeight:600,fontSize:12.5}}>
                  <input type="radio" checked={(step.connections || 5) === n}
                         onChange={() => updateStep(step.id, {connections: n})}
                         style={{accentColor:'var(--primary)'}}/>
                  {n} connections
                </label>
              ))}
            </div>
            {step.type === 'parallel_join' && (
              <div style={{marginTop:10}}>
                <label style={lbl}>Join Mode</label>
                <div style={{display:'flex', gap:14, marginTop:4}}>
                  {[['OR','OR — สายใดสายหนึ่งเสร็จ'],['AND','AND — ทุกสายต้องเสร็จ']].map(([v,l]) => (
                    <label key={v} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontWeight:600,fontSize:12.5}}>
                      <input type="radio" value={v} checked={(step.joinMode||'OR')===v}
                             onChange={() => updateStep(step.id,{joinMode:v})}
                             style={{accentColor:'var(--primary)'}}/>
                      {l}
                    </label>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      default: return null;
    }
  };

  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:730,maxWidth:'96vw',maxHeight:'92vh',display:'flex',flexDirection:'column'}}>

        <div className="modal-head">
          <div className="mh-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}>
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>
            </svg>
          </div>
          <div>
            <div className="mh-type">Auto-Generate Wizard</div>
            <div className="mh-title">🪄 สร้าง Exapilot Flowchart อัตโนมัติ</div>
          </div>
          <button onClick={onClose} style={{marginLeft:'auto',background:'rgba(255,255,255,.15)',border:'none',
            color:'#fff',borderRadius:7,padding:'5px 12px',cursor:'pointer',fontSize:13}}>✕ ปิด</button>
        </div>

        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',background:'var(--surface-2)'}}>
          <label style={{...lbl,marginTop:0}}>ชื่อ Procedure</label>
          <input style={inp} value={procName} onChange={e=>setProcName(e.target.value)} placeholder="Main Procedure Name"/>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:700,color:'var(--text)',fontSize:13}}>
              ขั้นตอน SOP&nbsp;
              <span style={{background:'var(--primary-soft)',color:'var(--primary)',padding:'2px 8px',
                borderRadius:999,fontSize:11,fontWeight:700}}>{steps.length} ขั้นตอน</span>
            </div>
            <button onClick={addStep} style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:7,
              padding:'7px 14px',cursor:'pointer',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5}}>
              {Icon.plus}&nbsp;เพิ่มขั้นตอน
            </button>
          </div>

          <div style={{textAlign:'center',marginBottom:6}}>
            <span style={{background:'#EBF8FF',border:'1.5px solid #1890FF',borderRadius:999,
              padding:'5px 20px',fontSize:12,fontWeight:700,color:'#1890FF'}}>▶ START</span>
          </div>
          <div style={{borderLeft:'2px dashed var(--border)',marginLeft:'50%',height:8}}/>

          {steps.length===0&&(
            <div style={{textAlign:'center',color:'var(--text-muted)',padding:'24px',
              border:'2px dashed var(--border)',borderRadius:10,fontSize:13}}>
              ยังไม่มีขั้นตอน — กด "+ เพิ่มขั้นตอน" เพื่อเริ่มสร้าง
            </div>
          )}

          {steps.map((step,idx)=>{
            const typeInfo = STEP_TYPES.find(t=>t.value===step.type)||{};
            return (
              <div key={step.id}>
                <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',
                  borderRadius:10,marginBottom:4,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',
                    background:'var(--surface-2)',borderBottom:'1px solid var(--border)'}}>
                    <span style={{background:'var(--primary)',color:'#fff',borderRadius:999,width:22,height:22,
                      display:'inline-flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,fontWeight:700,flexShrink:0}}>{idx+1}</span>
                    <select style={{...inp,flex:1,fontWeight:600,background:'#fff'}} value={step.type}
                      onChange={e=>updateStep(step.id,{type:e.target.value})}>
                      {STEP_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                    </select>
                    <span style={{fontSize:11,color:'var(--text-muted)',maxWidth:150,whiteSpace:'nowrap',
                      overflow:'hidden',textOverflow:'ellipsis',flexShrink:0}}>{typeInfo.desc}</span>
                    <div style={{display:'flex',gap:3,flexShrink:0}}>
                      <button onClick={()=>moveStep(step.id,'up')}   disabled={idx===0}              style={iconBtn} title="เลื่อนขึ้น">↑</button>
                      <button onClick={()=>moveStep(step.id,'down')} disabled={idx===steps.length-1} style={iconBtn} title="เลื่อนลง">↓</button>
                      <button onClick={()=>removeStep(step.id)}
                        style={{...iconBtn,color:'var(--err)',borderColor:'#fecaca'}} title="ลบขั้นตอนนี้">✕</button>
                    </div>
                  </div>
                  <div style={{padding:'10px 12px'}}>{renderFields(step)}</div>
                </div>
                <div style={{borderLeft:'2px dashed var(--border)',marginLeft:'50%',height:8}}/>
              </div>
            );
          })}

          <div style={{textAlign:'center',marginTop:4}}>
            <span style={{background:'#FFF1F0',border:'1.5px solid #FF4D4F',borderRadius:999,
              padding:'5px 20px',fontSize:12,fontWeight:700,color:'#FF4D4F'}}>■ END</span>
          </div>
        </div>

        <div className="modal-foot">
          <button onClick={onClose}>ยกเลิก</button>
          <button className="primary" disabled={steps.length===0}
            onClick={()=>{onGenerate(procName,steps);onClose();}}
            style={{display:'flex',alignItems:'center',gap:6}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}>
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>
            </svg>
            สร้าง Flowchart ({steps.length} ขั้นตอน)
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [procName, setProcName] = useState('Main Procedure 01');
  const [nodes, setNodes] = useState([]);
  const [edges, setEdges] = useState([]);
  const [tags, setTags]   = useState({ ...DEFAULT_TAGS });
  const [vars, setVars]   = useState({});
  const [selected, setSelected] = useState(null);
  const [paletteFilter, setPaletteFilter] = useState('');
  const [tab, setTab] = useState('props'); // props | tags | coach
  const [log, setLog] = useState([]);
  const [running, setRunning] = useState(false);
  const [paused, setPaused] = useState(false);
  const [statusMap, setStatusMap] = useState({});
  const [currentId, setCurrentId] = useState(null);
  const [activeEdgeId, setActiveEdgeId] = useState(null);
  const [runtimeTags, setRuntimeTags] = useState(null);
  const [runtimeVars, setRuntimeVars] = useState(null);
  const [speed, setSpeed] = useState(2);
  const [modal, setModal] = useState(null);
  const [showHelp, setShowHelp] = useState(false);
  const [showWizard, setShowWizard] = useState(false);
  const engineRef = useRef(null);

  /* ---- Persist via V3 IndexedDB Architecture ---- */
  useEffect(() => {
    STORAGE_ENGINE.initDB().then(() => {
      return STORAGE_ENGINE.getAll(APP_CONFIG.STORE_FLOWS);
    }).then(flows => {
      if (flows.length > 0) {
        const d = flows[0];
        if (d.nodes) setNodes(d.nodes);
        if (d.edges) setEdges(d.edges);
        if (d.tags) setTags(d.tags);
        if (d.procName) setProcName(d.procName);
      }
    }).catch(e => DEBUG_MODULE.log('error', 'CORE', 'Failed to load from IndexedDB', e));
  }, []);

  useEffect(() => {
    if (running) return;
    const timer = setTimeout(() => {
      STORAGE_ENGINE.set(APP_CONFIG.STORE_FLOWS, { id: 'default', procName, nodes, edges, tags })
        .catch(e => DEBUG_MODULE.log('error', 'STORAGE', 'Auto-save failed', e));
    }, 1000);
    return () => clearTimeout(timer);
  }, [nodes, edges, tags, procName, running]);

  /* ---- Coach issues ---- */
  const issues = useMemo(() => validateProcedure(nodes, edges, tags), [nodes, edges, tags]);
  const errCount  = issues.filter(i => i.level === 'err').length;
  const warnCount = issues.filter(i => i.level === 'warn').length;

  /* ---- Selected node ---- */
  const selectedNode = nodes.find(n => n.id === selected);
  const updateNodeConfig = (cfg) => {
    setNodes(ns => ns.map(n => n.id === selected ? { ...n, config: cfg } : n));
  };

  /* ---- Node operations ---- */
  const addNode = (type, x, y) => {
    const id = 'n' + Math.random().toString(36).slice(2, 8);
    const def = NODE_TYPES[type];
    setNodes(ns => [...ns, {
      id, type, x: Math.round(x / 10) * 10, y: Math.round(y / 10) * 10,
      config: { ...(def.defaultConfig || {}) }
    }]);
    setSelected(id);
    setTab('props');
  };
  const moveNode = (id, x, y) => {
    setNodes(ns => ns.map(n => n.id === id ? { ...n, x, y } : n));
  };
  const delNode = (id) => {
    setNodes(ns => ns.filter(n => n.id !== id));
    setEdges(es => es.filter(e => e.from !== id && e.to !== id));
    if (selected === id) setSelected(null);
  };
  
  const moveEdge = (id, dx, dy) => {
    setEdges(es => es.map(e => {
      if (e.id === id) {
        return { ...e, offsetX: (e.offsetX || 0) + dx, offsetY: (e.offsetY || 0) + dy };
      }
      return e;
    }));
  };

  const updateEdgeKind = (id, kind) => {
    setEdges(es => es.map(e => {
      if (e.id !== id) return e;
      // Only change the visual/semantic kind — keep fromHandle (and fromSide/toSide)
      // exactly as the user originally placed them so the connection point never moves.
      return { ...e, kind };
    }));
  };

  const connectNodes = (from, to, fromHandle, fromPort = 0, toPort = 0, fromSide = null, toSide = null, toHandle = 'in') => {
    setEdges(es => {
      const kind = (fromHandle === 'yes' || fromHandle === 'no' || fromHandle === 'rep') ? fromHandle : 'out';
      const fromNode = nodes.find(n => n.id === from);
      const toNode   = nodes.find(n => n.id === to);
      const fromIsParallel = NODE_TYPES[fromNode?.type]?.shape === 'parallel';
      const toIsParallel   = NODE_TYPES[toNode?.type]?.shape === 'parallel';
      const fSide = fromSide || (fromHandle === 'left' ? 'left' : fromHandle === 'right' ? 'right' : 'bottom');
      const tSide = toSide   || handleToSide(toHandle) || 'top';
      // toHandle stores the actual target handle name so handlePos returns the correct entry point
      const tHandle = toHandle || 'in';

      // Duplicate guard
      const exists = es.some(e =>
        e.from === from && e.to === to && e.kind === kind &&
        (e.fromPort ?? 0) === fromPort && (e.toPort ?? 0) === toPort &&
        (e.fromSide || 'bottom') === fSide && (e.toSide || 'top') === tSide
      );
      if (exists) return es;

      // For non-parallel, left/right handles allow MULTIPLE edges (different sides)
      // For semantic output handles (out/yes/no): one edge per kind per source
      let filtered = es.filter(e => {
        if (e.from === from) {
          if (fromIsParallel) return (e.fromPort ?? 0) !== fromPort;
          // left/right handles can have multiple edges (don't deduplicate by kind alone)
          if (fromHandle === 'left' || fromHandle === 'right') {
            return !((e.fromSide || 'bottom') === fSide && e.to === to);
          }
          return !(e.kind === kind && (kind === 'out' || kind === 'yes' || kind === 'no'));
        }
        return true;
      });

      if (toIsParallel) {
        filtered = filtered.filter(e => !(e.to === to && (e.toPort ?? 0) === toPort));
      }

      return [...filtered, {
        id: 'e' + Math.random().toString(36).slice(2, 8),
        from, to, kind,
        fromPort, toPort,
        fromHandle, toHandle: tHandle,
        fromSide: fSide, toSide: tSide
      }];
    });
  };
  const delEdge = (id) => setEdges(es => es.filter(e => e.id !== id));

  /* ---- Tag operations ---- */
  const addTag = (name, value) => {
    const v = isNaN(Number(value)) ? value : Number(value);
    setTags(t => ({ ...t, [name]: { value: v, type: typeof v === 'number' ? 'number' : 'text', desc: '' } }));
  };
  const setTagVal = (name, value) => {
    if (running && engineRef.current) {
      engineRef.current.updateTag(name, value);
      return;
    }
    setTags(t => {
      const cur = t[name];
      if (!cur) return t;
      const v = cur.type === 'number' && !isNaN(Number(value)) ? Number(value) : value;
      return { ...t, [name]: { ...cur, value: v } };
    });
  };
  const removeTag = (name) => {
    setTags(t => { const n = { ...t }; delete n[name]; return n; });
  };

  /* ---- Sample / Clear ---- */
  const loadSample = useCallback(() => {
    if (nodes.length && !confirm('โหลดตัวอย่างจะทับงานปัจจุบัน — ดำเนินการ?')) return;
    const s = buildSampleProcedure();
    setNodes(s.nodes); setEdges(s.edges);
    setTags({ ...DEFAULT_TAGS });
    setProcName('Sample: Stack Silo Setup');
    setLog([]);
    pushLog('info', 'โหลดตัวอย่าง procedure แล้ว — กด ▶ Run เพื่อทดสอบ');
  }, [nodes.length, pushLog]);
  const clearAll = () => {
    if (!confirm('ล้าง procedure ทั้งหมด?')) return;
    setNodes([]); setEdges([]); setSelected(null); setLog([]); setStatusMap({}); setCurrentId(null);
  };
  useEffect(() => { window.__loadSample = loadSample; }, [loadSample]);

  /* ---- Apply Wizard-generated flowchart ---- */
  const applyWizard = (wProcName, wSteps) => {
    if (nodes.length && !confirm('การสร้างใหม่จะแทนที่ flowchart ปัจจุบัน — ดำเนินการ?')) return;
    const result = generateFlowchartFromWizard(wProcName, wSteps);
    setNodes(result.nodes);
    setEdges(result.edges);
    setProcName(result.procName);
    setSelected(null);
    setStatusMap({});
    setCurrentId(null);
    setLog([]);
    pushLog('info', `🪄 สร้าง Flowchart อัตโนมัติ — ${result.nodes.length} blocks, ${result.edges.length} edges`);
  };

  /* ---- Save / Load file ---- */
  const saveFile = () => {
    const blob = new Blob([JSON.stringify({ procName, nodes, edges, tags }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${procName.replace(/\s+/g,'_')}.exapilot.json`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  };
  const loadFile = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,.exapilot';
    inp.style.display = 'none';
    inp.onchange = (e) => {
      const f = e.target.files[0];
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          if (d.nodes) setNodes(d.nodes);
          if (d.edges) setEdges(d.edges);
          if (d.tags) setTags(d.tags);
          if (d.procName) setProcName(d.procName);
          pushLog('info', `โหลดไฟล์ ${f.name} แล้ว`);
        } catch (err) { alert('ไฟล์ไม่ถูกต้อง'); }
      };
      r.readAsText(f);
      document.body.removeChild(inp);
    };
    document.body.appendChild(inp);
    inp.click();
  };

  /* ---- Logging ---- */
  const pushLog = useCallback((tag, msg) => {
    const ts = new Date().toTimeString().slice(0, 8);
    setLog(L => [...L, { time: ts, tag, msg }].slice(-500));
  }, []);

  /* ---- Run / Stop ---- */
  const run = async () => {
    if (running) return;
    if (errCount > 0) {
      setModal({
        type: 'coach',
        config: { message: `พบ ${errCount} ข้อผิดพลาดใน procedure — กรุณาแก้ไขก่อนรัน`,
                  detail: issues.filter(i => i.level === 'err').map((i, n) => `${n+1}. ${i.title}\n   ${i.detail}`).join('\n\n') },
        resolve: (v) => { setModal(null); setTab('coach'); }
      });
      return;
    }
    setRunning(true); setPaused(false); setLog([]);
    setStatusMap({}); setCurrentId(null); setActiveEdgeId(null);

    const engine = new ExapilotEngine({
      nodes, edges, tags, vars, speed, procName,
      onLog: (entry) => setLog(L => [...L, entry].slice(-500)),
      onState: (st) => {
        setCurrentId(st.currentId);
        setActiveEdgeId(st.activeEdgeId);
        setStatusMap(st.statusMap);
        setRuntimeTags(st.tags);
        setRuntimeVars(st.vars);
      },
      onConfirm: (cfg) => new Promise(res => {
        setModal({ type: 'confirm', config: cfg, resolve: (v) => { setModal(null); res(v); } });
      }),
      onGuidance: (cfg) => new Promise(res => {
        setModal({ type: 'guidance', config: cfg, resolve: () => { setModal(null); res(true); } });
      }),
      onAlarm: (cfg) => new Promise(res => {
        setModal({ type: 'alarm', config: cfg, resolve: () => { setModal(null); res(true); } });
      }),
      onDone: (state) => {
        setRunning(false); setPaused(false);
        setCurrentId(null); setActiveEdgeId(null);
      }
    });
    engineRef.current = engine;
    engine.run();
  };

  // Stop engine on component unmount to prevent memory leaks
  useEffect(() => {
    return () => { engineRef.current?.stop?.(); };
  }, []);

  // sync speed during run
  useEffect(() => { engineRef.current?.setSpeed?.(speed); }, [speed]);

  const stop = () => { engineRef.current?.stop?.(); };
  const pause = () => { engineRef.current?.pause?.(); setPaused(true); };
  const resume = () => { engineRef.current?.resume?.(); setPaused(false); };
  const resetView = () => { setStatusMap({}); setCurrentId(null); setActiveEdgeId(null); setRuntimeTags(null); setRuntimeVars(null); setLog([]); };

  const status = running ? (paused ? 'paused' : 'running') : (errCount > 0 ? 'error' : 'idle');
  const statusLabel = running ? (paused ? 'PAUSED' : 'RUNNING') : (errCount > 0 ? `${errCount} ERR` : 'READY');

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div>
            <div className="title">Exapilot Studio</div>
            <div className="sub">SOP Automation Builder</div>
          </div>
        </div>

        <div className="divider-v"></div>

        <input className="proc-name" value={procName} onChange={(e) => setProcName(e.target.value)}
               placeholder="Main Procedure Name"/>

        <div className={`status-pill ${status}`}>
          <span className="dot"></span>{statusLabel}
        </div>

        <div className="spacer"></div>

        <div className="top-actions">
          {!running && (
            <button className="tbtn primary" onClick={run}>{Icon.play}<span className="tbtn-label">Run</span></button>
          )}
          {running && !paused && (
            <button className="tbtn" onClick={pause}>{Icon.pause}<span className="tbtn-label">Pause</span></button>
          )}
          {running && paused && (
            <button className="tbtn primary" onClick={resume}>{Icon.play}<span className="tbtn-label">Resume</span></button>
          )}
          {running && (
            <button className="tbtn danger" onClick={stop}>{Icon.stop}<span className="tbtn-label">Stop</span></button>
          )}
          <button className="tbtn ghost" onClick={resetView} disabled={running}>{Icon.reset}<span className="tbtn-label">Reset</span></button>

          <div className="divider-v"></div>

          <div className="speed-ctrl">
            <span className="speed-label">Speed:</span>
            <select value={speed} onChange={(e) => setSpeed(Number(e.target.value))}>
              <option value="0.5">0.5×</option>
              <option value="1">1×</option>
              <option value="2">2×</option>
              <option value="5">5×</option>
              <option value="10">10×</option>
            </select>
          </div>

          <div className="divider-v"></div>

          <button className="tbtn" onClick={() => setShowWizard(true)}
            style={{background:'linear-gradient(135deg,#7C3AED,#4F46E5)',color:'#fff',
                    border:'1px solid rgba(255,255,255,.25)',boxShadow:'0 4px 14px rgba(124,58,237,.45)'}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}>
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>
            </svg>
            <span className="tbtn-label">🪄 Auto-Generate</span>
          </button>

          <div className="divider-v"></div>

          <button className="tbtn" onClick={loadSample}>{Icon.sample}<span className="tbtn-label">ตัวอย่าง</span></button>
          <button className="tbtn" onClick={saveFile}>{Icon.save}<span className="tbtn-label">Save</span></button>
          <button className="tbtn" onClick={loadFile}>{Icon.load}<span className="tbtn-label">Load</span></button>
          <button className="tbtn ghost" onClick={clearAll}>{Icon.clear}<span className="tbtn-label">Clear</span></button>

          <div className="divider-v"></div>
          <button className="tbtn" style={{background:'rgba(255,255,255,.08)',color:'#fff',border:'1px solid rgba(255,255,255,.2)'}} onClick={() => setShowHelp(true)}>{Icon.help}<span className="tbtn-label">คู่มือ</span></button>
        </div>
      </header>

      <div className="main">
        <Palette filter={paletteFilter} onFilter={setPaletteFilter}/>

        <Canvas
          nodes={nodes} edges={edges} selected={selected}
          statusMap={statusMap} currentId={currentId} activeEdgeId={activeEdgeId}
          onSelect={(id) => { setSelected(id); if (id) setTab('props'); }}
          onMove={moveNode}
          onEdgeMove={moveEdge}
          onEdgeUpdateKind={updateEdgeKind}
          onDelete={delNode}
          onAddNode={addNode}
          onConnect={connectNodes}
          onDeleteEdge={delEdge}
          onCanvasClick={() => setSelected(null)}
        />

        <div className="right-panel">
          <div className="rp-tabs">
            <button className={`rp-tab ${tab==='props' ? 'active':''}`} onClick={() => setTab('props')}>
              {Icon.props} Properties
            </button>
            <button className={`rp-tab ${tab==='tags' ? 'active':''}`} onClick={() => setTab('tags')}>
              {Icon.tags} Tags
            </button>
            <button className={`rp-tab ${tab==='coach' ? 'active':''}`} onClick={() => setTab('coach')}>
              {Icon.coach} Coach
              {errCount > 0 && <span className="badge">{errCount}</span>}
              {errCount === 0 && warnCount > 0 && <span className="badge warn">{warnCount}</span>}
            </button>
          </div>
          <div className="rp-content">
            {tab === 'props' && (
              <PropertiesPanel node={selectedNode} onChange={updateNodeConfig} tags={tags}/>
            )}
            {tab === 'tags' && (
              <TagsPanel tags={tags} vars={vars} runtimeTags={runtimeTags} runtimeVars={runtimeVars}
                         onAddTag={addTag} onSetTag={setTagVal} onRemoveTag={removeTag} running={running}/>
            )}
            {tab === 'coach' && (
              <CoachPanel issues={issues} onJump={(id) => { setSelected(id); setTab('props'); }}/>
            )}
          </div>
        </div>
      </div>

      <Console log={log} onClear={() => setLog([])}/>

      {modal && <MsgModal data={modal} onResolve={modal.resolve}/>}
      {showHelp && <HelpModal onClose={() => setShowHelp(false)}/>}
      {showWizard && <AutoWizardModal onClose={() => setShowWizard(false)} onGenerate={applyWizard}/>}

      {/* Glass Badge Signature */}
      <GlassBadge status="online" />

      {/* datalist for tag autocomplete */}
      <datalist id="tag-list">
        {Object.keys(tags).map(t => <option key={t} value={t}/>)}
        {Object.keys(vars).map(v => <option key={v} value={v}/>)}
      </datalist>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
    const obs = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const s = document.getElementById('splash');
        if (s) s.style.display = 'none';
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
