<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <title>Exapilot Studio — SOP Automation Builder</title>
  <meta name="viewport" content="width=1280"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
/* =========================================================
   EXAPILOT STUDIO — DCS-style SOP flow simulator
   Palette: navy / white / industrial blue
   ========================================================= */

:root {
  --bg:           #F1F5FB;
  --bg-deep:      #E8EFF8;
  --surface:      #FFFFFF;
  --surface-2:    #F8FAFD;
  --surface-3:    #EEF3FB;
  --border:       #D9E3F1;
  --border-strong:#B9C7DD;
  --text:         #0C1B33;
  --text-2:       #44557A;
  --text-muted:   #7A8AA8;

  --navy:         #0B2A52;
  --navy-2:       #0E3B73;
  --primary:      #1858BF;
  --primary-2:    #2A6EE0;
  --primary-soft: #E6EEFC;
  --accent:       #00B6F1;
  --accent-2:     #5BD0FF;

  --ok:           #16A34A;
  --ok-soft:      #DFF5E5;
  --warn:         #D97706;
  --warn-soft:    #FEF1DA;
  --err:          #DC2626;
  --err-soft:     #FDE2E2;
  --info:         #0EA5E9;

  --shadow-1: 0 1px 2px rgba(13,30,60,.06), 0 1px 3px rgba(13,30,60,.04);
  --shadow-2: 0 6px 16px rgba(13,30,60,.10), 0 2px 4px rgba(13,30,60,.06);
  --shadow-3: 0 20px 40px rgba(13,30,60,.18), 0 6px 12px rgba(13,30,60,.08);

  --r-sm: 6px;
  --r:    10px;
  --r-lg: 14px;

  --grid: #E0E8F4;
  --grid-strong: #D2DEEF;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: 'Inter', 'IBM Plex Sans Thai', system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; }

/* ========== Brand Signature (Glass Badge) ========== */
.glass-badge {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  background: rgba(19,19,22,.70); backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,.08); border-radius: 9999px;
  padding: 7px 14px 7px 10px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 12px 40px rgba(0,0,0,.15);
  animation: float 4s ease-in-out infinite;
  color: #fff; font-family: 'Inter', sans-serif;
}
.glass-badge .status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,.2);
}
.glass-badge span { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.glass-badge .ver { color: #94a3b8; font-weight: 400; font-size: 10px; text-transform: none; letter-spacing: 0; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ========== Custom Context Menu ========== */
.custom-context-menu {
  font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
}
.context-menu-item {
  padding: 6px 16px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
  white-space: nowrap;
}
.context-menu-item:hover {
  background: var(--primary-soft);
  color: var(--primary);
}
.context-menu-item.danger:hover {
  background: var(--err-soft);
  color: var(--err);
}

/* ========== App shell ========== */
.app {
  display: grid;
  grid-template-rows: 56px 1fr 200px;
  height: 100vh;
  width: 100vw;
}

/* ========== Top bar ========== */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 18px;
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
  color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.25);
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, var(--shadow-1);
  z-index: 30;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; letter-spacing: .3px;
  flex-shrink: 0;
  white-space: nowrap;
}
.brand > div { min-width: 0; }
.brand .logo {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--primary-2) 100%);
  display: grid; place-items: center;
  box-shadow: 0 0 0 1px rgba(255,255,255,.18) inset, 0 4px 10px rgba(0,180,241,.35);
}
.brand .logo svg { width: 18px; height: 18px; }
.brand .title { font-size: 14px; white-space: nowrap; line-height: 1.1; }
.brand .sub { font-size: 11px; opacity: .65; font-weight: 500; white-space: nowrap; line-height: 1.1; margin-top: 2px; }

.proc-name {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.14);
  color: #fff;
  padding: 6px 10px;
  border-radius: 8px;
  min-width: 0;
  width: 240px;
  flex-shrink: 1;
  outline: none;
}
.proc-name:focus { border-color: var(--accent); }

.top-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.tbtn {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,.12);
  padding: 7px 11px;
  border-radius: 8px;
  font-weight: 500;
  transition: all .15s ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.tbtn:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.22); }
.tbtn:active { transform: translateY(1px); }
.tbtn svg { width: 14px; height: 14px; }
.tbtn.primary {
  background: linear-gradient(180deg, #2BA0FF 0%, #1858BF 100%);
  border-color: rgba(255,255,255,.25);
  box-shadow: 0 4px 14px rgba(43,160,255,.4);
}
.tbtn.primary:hover { filter: brightness(1.06); }
.tbtn.danger {
  background: linear-gradient(180deg, #E5484D 0%, #C0202B 100%);
  border-color: rgba(255,255,255,.2);
}
.tbtn.ghost { background: transparent; }

.divider-v { width: 1px; height: 24px; background: rgba(255,255,255,.14); }

.spacer { flex: 1; }

.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.18);
  flex-shrink: 0;
  white-space: nowrap;
}
.status-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #9AA8C0; }
.status-pill.idle .dot { background: #9AA8C0; }
.status-pill.running .dot { background: #34D399; box-shadow: 0 0 0 4px rgba(52,211,153,.25); animation: pulse 1.2s ease-in-out infinite; }
.status-pill.paused .dot { background: #FACC15; }
.status-pill.error .dot { background: #F87171; }
.status-pill.stopped .dot { background: #EF4444; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,.45); }
  50%     { box-shadow: 0 0 0 6px rgba(52,211,153,0);   }
}

.speed-ctrl {
  display: flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,.85);
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}
.speed-ctrl select {
  background: rgba(255,255,255,.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 6px;
  padding: 4px 8px;
  outline: none;
}

/* Responsive: hide some chrome on narrower screens */
@media (max-width: 1400px) {
  .brand .sub { display: none; }
  .tbtn .tbtn-label { display: none; }
  .speed-ctrl .speed-label { display: none; }
}
@media (max-width: 1180px) {
  .proc-name { width: 160px; }
  .topbar { gap: 10px; padding: 0 12px; }
}

/* ========== Main area: palette / canvas / right panel ========== */
.main {
  display: grid;
  grid-template-columns: 240px 1fr 320px;
  min-height: 0;
  background: var(--bg);
}

/* ---------- Palette ---------- */
.palette {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 8px 80px;
}
.palette h4 {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin: 14px 8px 6px;
  font-weight: 700;
}
.palette h4:first-child { margin-top: 4px; }
.palette-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: 8px;
  margin: 2px 4px;
  cursor: grab;
  user-select: none;
  border: 1px solid transparent;
  transition: background .12s, border-color .12s;
}
.palette-item:hover {
  background: var(--primary-soft);
  border-color: #C6D6F2;
}
.palette-item:active { cursor: grabbing; }
.palette-item .pi-icon {
  width: 30px; height: 30px;
  border-radius: 7px;
  display: grid; place-items: center;
  background: var(--surface-3);
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.palette-item .pi-icon svg { width: 16px; height: 16px; }
.palette-item .pi-label { font-weight: 600; color: var(--text); font-size: 12.5px; line-height: 1.1; }
.palette-item .pi-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }
.palette-search {
  width: calc(100% - 8px);
  margin: 4px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  background: var(--surface-2);
}
.palette-search:focus { border-color: var(--primary); background: #fff; }

/* ---------- Canvas ---------- */
.canvas-container {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0) 0 0 / 22px 22px,
    radial-gradient(circle at 1px 1px, var(--grid-strong) 1.4px, transparent 0) 0 0 / 110px 110px,
    linear-gradient(180deg, #F4F8FE 0%, #ECF2FB 100%);
}
.canvas-wrap {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  width: 8000px; height: 6000px;
  pointer-events: none;
}
.canvas-wrap > * { pointer-events: auto; }
.edges-svg, .overlay-svg {
  position: absolute; top: 0; left: 0;
  width: 8000px; height: 6000px;
  pointer-events: none;
}
.edges-svg path { pointer-events: stroke; cursor: pointer; }

/* zoom HUD */
.canvas-hud {
  position: absolute;
  bottom: 14px; left: 14px;
  display: flex; gap: 6px; align-items: center;
  background: rgba(255,255,255,.95);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  box-shadow: var(--shadow-2);
  z-index: 5;
}
.canvas-hud button {
  width: 30px; height: 30px;
  border: none; background: transparent;
  border-radius: 6px;
  display: grid; place-items: center;
  color: var(--text-2);
}
.canvas-hud button:hover { background: var(--surface-3); color: var(--primary); }
.canvas-hud .zlevel { padding: 0 8px; font-size: 12px; color: var(--text-2); min-width: 42px; text-align: center; font-variant-numeric: tabular-nums;}

.canvas-watermark {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 11px;
  color: var(--text-muted);
  background: rgba(255,255,255,.85);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  z-index: 5;
}
.canvas-watermark .mw-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }

.empty-state {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  pointer-events: none;
  color: var(--text-muted);
}
.empty-state .es-card {
  background: rgba(255,255,255,.78);
  backdrop-filter: blur(8px);
  border: 1.5px dashed var(--border-strong);
  border-radius: 14px;
  padding: 24px 28px;
  text-align: center;
  max-width: 380px;
}
.empty-state h3 { margin: 8px 0 4px; color: var(--text); font-size: 15px; }
.empty-state p { margin: 0; font-size: 12.5px; }
.empty-state .es-shortcut {
  margin-top: 10px;
  display: inline-block;
  background: var(--primary-soft);
  color: var(--primary);
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 600;
  pointer-events: auto;
  cursor: pointer;
}

/* ========== Nodes ========== */
.node {
  position: absolute;
  user-select: none;
  cursor: grab;
}
.node.dragging { cursor: grabbing; z-index: 40; }
.node-body {
  background: #ffffff;
  border: 1px solid var(--border-strong);
  border-radius: 6px; /* คมขึ้นตาม Exapilot อุตสาหกรรมดั้งเดิม */
  padding: 8px 12px;
  min-width: 160px;
  max-width: 260px;
  box-shadow: var(--shadow-1);
  position: relative;
  transition: box-shadow .15s, border-color .15s, transform .12s;
}
.node:hover .node-body { box-shadow: var(--shadow-2); }
.node.selected .node-body {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(24,88,191,.18), var(--shadow-2);
}
.node.running .node-body {
  border-color: var(--ok);
  box-shadow: 0 0 0 4px rgba(22,163,74,.18), 0 6px 18px rgba(22,163,74,.25);
  animation: nodepulse 1s ease-in-out infinite;
}
.node.done .node-body { border-color: #94CFA8; background: var(--ok-soft); }
.node.error .node-body {
  border-color: var(--err);
  background: var(--err-soft);
  box-shadow: 0 0 0 3px rgba(220,38,38,.18);
}
@keyframes nodepulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(22,163,74,.10), 0 6px 18px rgba(22,163,74,.20); }
  50%     { box-shadow: 0 0 0 8px rgba(22,163,74,.05), 0 6px 22px rgba(22,163,74,.35); }
}

.node-head {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 4px;
}
.node-head .nh-icon {
  width: 22px; height: 22px;
  border-radius: 4px;
  display: grid; place-items: center;
  background: var(--primary-soft);
  color: var(--primary);
  flex-shrink: 0;
}
.node-head .nh-icon svg { width: 13px; height: 13px; }
.node-head .nh-type {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.node-head .nh-status {
  margin-left: auto;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #C9D3E4;
}
.node.running .nh-status { background: #22C55E; box-shadow: 0 0 0 3px rgba(34,197,94,.3); }
.node.done .nh-status    { background: #16A34A; }
.node.error .nh-status   { background: #DC2626; }

.node-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  line-height: 1.25;
  word-break: break-word;
}
.node-meta {
  margin-top: 5px;
  font-size: 11px;
  color: var(--text-2);
  font-family: 'Inter', 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;
  background: var(--surface-2);
  padding: 4px 7px;
  border-radius: 5px;
  word-break: break-all;
  white-space: pre-wrap;
}
.node-meta.empty { font-style: italic; color: var(--text-muted); font-family: inherit; }
.node-side-stripe {
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 4px;
  border-radius: 4px 0 0 4px;
  background: var(--primary);
}

/* Color variants per category with slightly richer icons */
.node.cat-terminal .node-side-stripe { background: var(--ok); }
.node.cat-terminal .nh-icon { background: var(--ok-soft); color: var(--ok); }
.node.cat-end .node-side-stripe { background: var(--err); }
.node.cat-end .nh-icon { background: var(--err-soft); color: var(--err); }
.node.cat-condition .node-side-stripe { background: var(--primary-2); }
.node.cat-condition .nh-icon { background: var(--primary-soft); color: var(--primary); }
.node.cat-timing .node-side-stripe { background: var(--warn); }
.node.cat-timing .nh-icon { background: var(--warn-soft); color: var(--warn); }
.node.cat-output .node-side-stripe { background: #6D28D9; }
.node.cat-output .nh-icon { background: #EFE7FD; color: #6D28D9; }
.node.cat-message .node-side-stripe { background: var(--info); }
.node.cat-message .nh-icon { background: #E0F4FE; color: var(--info); }
.node.cat-flow .node-side-stripe { background: var(--text-2); }
.node.cat-flow .nh-icon { background: var(--surface-3); color: var(--text-2); }
.node.cat-util .node-side-stripe { background: #0F766E; }
.node.cat-util .nh-icon { background: #DBF1EE; color: #0F766E; }

/* START / END Capsules (Vivid Pill Shapes) */
.node.shape-pill .node-body { border-radius: 999px; padding: 8px 24px; text-align: center; min-width: 110px; }
.node.shape-pill .node-head { justify-content: center; }
.node.shape-pill .nh-status { display: none; }
.node.shape-pill .nh-type { display: none; }
.node.shape-pill .node-title { font-size: 14px; font-weight: 700; letter-spacing: .8px; }
.node.shape-pill .node-side-stripe { display: none; }

/* START: Light ocean blue pill */
.node.cat-terminal.shape-pill .node-body {
  background: #EBF8FF;
  border: 1.5px solid #1890FF;
  box-shadow: 0 4px 10px rgba(24,144,255,0.15);
}
/* END: Light rose red pill */
.node.cat-end.shape-pill .node-body {
  background: #FFF1F0;
  border: 1.5px solid #FF4D4F;
  box-shadow: 0 4px 10px rgba(255,77,79,0.15);
}

/* Hexagonal AND/OR Gate */
.node.shape-hex .node-body {
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  padding: 12px 28px;
  min-width: 170px;
  min-height: 74px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.node.shape-hex .node-body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #F0F7FF;
  border: 1.5px solid #1858BF;
  clip-path: polygon(16px 0%, calc(100% - 16px) 0%, 100% 50%, calc(100% - 16px) 100%, 16px 100%, 0% 50%);
  z-index: 0;
  transition: border-color .15s, background-color .15s;
}
.node.shape-hex .node-side-stripe { display: none; }
.node.shape-hex .node-head, .node.shape-hex .node-title, .node.shape-hex .node-meta {
  position: relative;
  z-index: 2;
}
.node.shape-hex .node-title { text-align: center; }
.node.shape-hex.selected .node-body::before {
  border-color: #00B6F1;
  box-shadow: 0 0 0 3px rgba(0,182,241,.2);
}
.node.shape-hex.running .node-body::before {
  border-color: var(--ok);
  background: #E8FDF0;
}
.node.shape-hex.done .node-body::before {
  border-color: #94CFA8;
  background: #F5F7FA;
}

/* AND gate = Sea blue rect, OR gate = Violet rect */
.node.cat-and .node-body { background: #E6F4FF; border-color: #1D4ED8; }
.node.cat-and .nh-icon { background: #DBEAFE; color: #1D4ED8; }
.node.cat-and.selected .node-body { border-color: #1D4ED8; box-shadow: 0 0 0 3px rgba(29,78,216,.2), var(--shadow-2); }
.node.cat-or .node-body { background: #F5F3FF; border-color: #7C3AED; }
.node.cat-or .nh-icon { background: #EDE9FE; color: #7C3AED; }
.node.cat-or.selected .node-body { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,.2), var(--shadow-2); }
.node.cat-condition .node-body { background: #F0F7FF; border-color: #1858BF; }
.node.cat-condition .nh-icon { background: #DBEAFE; color: #1858BF; }
.node.cat-condition.selected .node-body { border-color: #1858BF; box-shadow: 0 0 0 3px rgba(24,88,191,.2), var(--shadow-2); }

/* Diamond Branch Shape */
.node.shape-diamond .node-body {
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  padding: 20px;
  min-width: 104px;
  min-height: 104px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.node.shape-diamond .node-body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #FFF7ED;
  border: 1.5px solid #F97316;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  z-index: 0;
  transition: border-color .15s, background-color .15s;
}
.node.shape-diamond .node-side-stripe { display: none; }
.node.shape-diamond .node-head, .node.shape-diamond .node-title, .node.shape-diamond .node-meta {
  position: relative;
  z-index: 2;
}
.node.shape-diamond .node-head { flex-direction: column; align-items: center; gap: 3px; }
.node.shape-diamond .node-title { text-align: center; font-size: 11px; }
.node.shape-diamond .node-meta { display: none; }
.node.shape-diamond.selected .node-body::before { border-color: var(--primary); }
.node.shape-diamond.running .node-body::before { background: #FFF1E6; border-color: var(--ok); }

/* Circle Connector Shape */
.node.shape-circle .node-body {
  border-radius: 50%;
  width: 56px; height: 56px;
  min-width: 56px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: #E6FFED;
  border: 1.5px solid #28A745;
  box-shadow: var(--shadow-1);
}
.node.shape-circle .node-side-stripe { display: none; }
.node.shape-circle .node-head { flex-direction: column; justify-content: center; margin-bottom: 0; gap: 2px; }
.node.shape-circle .node-head .nh-icon { background: transparent; color: #28A745; }
.node.shape-circle .node-title { font-size: 10px; text-align: center; font-weight: 700; color: #1E7E34; }
.node.shape-circle .node-meta { display: none; }

/* Wide Flat Bar for Parallel Blocks — double horizontal rail style */
.node.shape-parallel .node-body {
  min-width: 220px;
  max-width: 280px;
  padding: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* The double-bar rail drawn with pseudo-elements */
.node.shape-parallel .node-body::before,
.node.shape-parallel .node-body::after {
  content: '';
  display: block;
  width: 100%;
  height: 4px;
  background: #1a6eaf;
  border-radius: 2px;
}
.node.shape-parallel .node-body::before { margin-bottom: 2px; }
.node.shape-parallel .node-body::after  { margin-top: 2px; }
.node.shape-parallel .node-side-stripe { display: none; }
.node.shape-parallel .node-head { display: none; }
.node.shape-parallel .node-actions { top: 50%; transform: translateY(-50%); right: -26px; }
/* Center label between the two bars */
.node.shape-parallel .node-title {
  color: #1a6eaf;
  font-size: 10px;
  font-weight: 800;
  text-align: center;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  order: -1; /* show label between bars by reordering: title before ::after */
}
.node.shape-parallel .node-meta {
  color: var(--text-muted);
  font-size: 9.5px;
  text-align: center;
  padding: 0 4px 2px;
  white-space: nowrap;
}
/* Connection-point tick marks on the bar (decorative) */
.para-ticks {
  display: flex;
  justify-content: space-evenly;
  width: 100%;
  position: absolute;
  left: 0;
}
.para-ticks span {
  width: 5px; height: 5px;
  background: #1a6eaf;
  border: 1.5px solid #5BD0FF;
  border-radius: 1px;
}
/* Parallel multi-port handles — small squares on the bars */
.handle.h-para-in,
.handle.h-para-out {
  width: 8px; height: 8px;
  background: #e2e8f0;
  border: 2px solid #1a6eaf;
  border-radius: 2px;
}
.handle.h-para-in:hover,
.handle.h-para-out:hover {
  background: var(--primary);
  border-color: #fff;
  transform: translateX(-50%) scale(1.35);
  box-shadow: 0 0 0 3px rgba(24,88,191,.3);
}
.handle.h-para-in.connecting,
.handle.h-para-out.connecting {
  background: var(--primary);
  border-color: #fff;
}
/* OR mode: highlight bar in cyan-green */
.node.shape-parallel.para-or .node-body::before,
.node.shape-parallel.para-or .node-body::after { background: #0e7490; }
.node.shape-parallel.para-or .handle.h-para-in,
.node.shape-parallel.para-or .handle.h-para-out { border-color: #0e7490; }
.node.shape-parallel.para-or .node-title { color: #0e7490; }
/* Running/done/error state */
.node.running.shape-parallel .node-body::before,
.node.running.shape-parallel .node-body::after { background: var(--primary); box-shadow: 0 0 6px rgba(24,88,191,.5); }
.node.done.shape-parallel .node-body::before,
.node.done.shape-parallel .node-body::after { background: #64748b; }
.node.error.shape-parallel .node-body::before,
.node.error.shape-parallel .node-body::after { background: var(--err); }

/* Paused status (yellow) */
.node.paused .node-body {
  border-color: var(--warn);
  background: var(--warn-soft);
  box-shadow: 0 0 0 3px rgba(217,119,6,.18);
}
.node.done .node-body { border-color: #CBD5E1; background: #F3F4F6; }

/* Category-specific stripe colors matching Exapilot manual */
.node.cat-timer .node-side-stripe { background: #EA580C; }
.node.cat-timer .nh-icon { background: #FFF1EC; color: #EA580C; }
.node.cat-subproc .node-side-stripe { background: #0F766E; }
.node.cat-subproc .nh-icon { background: #CCFBF1; color: #0F766E; }

/* Square connection handles (matching real Exapilot Builder) */
.handle {
  position: absolute;
  width: 9px; height: 9px; /* ดีไซน์ประณีต เล็กและกระชับยิ่งขึ้น */
  background: var(--primary);
  border: 1.5px solid #fff;
  border-radius: 2px;
  z-index: 3;
  cursor: crosshair;
  transition: transform .12s, box-shadow .12s;
}
.handle:hover {
  transform: scale(1.4);
  box-shadow: 0 0 0 4px rgba(24,88,191,.25);
}
/* Fix: preserve translateX(-50%) centering on hover for positioned handles */
.handle.h-in:hover,
.handle.h-out:hover,
.handle.h-yes:hover,
.handle.h-no:hover {
  transform: translateX(-50%) scale(1.4);
}
.handle.h-left:hover,
.handle.h-rep:hover {
  transform: translateY(-50%) scale(1.4);
}
.handle.h-right:hover {
  transform: translateY(-50%) scale(1.4);
}
.handle.connecting { background: var(--primary); }
.handle.h-in {
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
}
.handle.h-out {
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
}
.handle.h-yes {
  bottom: -5px;
  left: 30%;
  transform: translateX(-50%);
  border-color: var(--ok);
}
.handle.h-no {
  bottom: -5px;
  left: 70%;
  transform: translateX(-50%);
  border-color: var(--err);
}
.handle.h-rep {
  top: 30%;
  left: -5px;
  transform: translateY(-50%);
  border-color: var(--warn);
}
/* 4-side handles: left and right center */
.handle.h-left {
  top: 50%;
  left: -5px;
  transform: translateY(-50%);
  background: #64748b;
  border-color: #fff;
}
.handle.h-right {
  top: 50%;
  right: -5px;
  transform: translateY(-50%);
  background: #64748b;
  border-color: #fff;
}
.handle-label {
  position: absolute;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .8px;
  color: var(--text-muted);
  pointer-events: none;
  white-space: nowrap;
}
.handle-label.yes { bottom: -20px; left: 22%; color: var(--ok); }
.handle-label.no  { bottom: -20px; left: 62%; color: var(--err); }
.handle-label.rep { top: 22%; left: -32px; color: var(--warn); }

/* Node delete */
.node-actions {
  position: absolute; top: -10px; right: -10px;
  display: none; gap: 4px;
}
.node.selected .node-actions { display: flex; }
.node-actions button {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--border-strong);
  color: var(--err);
  display: grid; place-items: center;
  box-shadow: var(--shadow-1);
}
.node-actions button:hover { background: var(--err); color: #fff; border-color: var(--err); }
.node-actions button svg { width: 12px; height: 12px; }

/* Edge styling */
.edge-path { fill: none; stroke: #97A8C5; stroke-width: 2; transition: stroke .15s; }
.edge-path.selected { stroke: var(--primary); stroke-width: 3; }
.edge-path.yes { stroke: var(--ok); }
.edge-path.no  { stroke: var(--err); }
.edge-path.rep { stroke: var(--warn); stroke-dasharray: 6 4; }
.edge-path.active {
  stroke: var(--primary);
  stroke-width: 3.5;
  stroke-dasharray: 10 6;
  animation: dash 1s linear infinite;
  filter: drop-shadow(0 0 4px rgba(24,88,191,.5));
}
@keyframes dash { to { stroke-dashoffset: -16; } }
.edge-label {
  font-size: 10.5px;
  font-weight: 700;
  fill: var(--text-muted);
  paint-order: stroke;
  stroke: rgba(255,255,255,.95);
  stroke-width: 3px;
}
.edge-label.yes { fill: var(--ok); }
.edge-label.no  { fill: var(--err); }
.edge-label.rep { fill: var(--warn); }

/* ========== Right panel ========== */
.right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  min-height: 0;
}
.rp-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.rp-tab {
  flex: 1;
  padding: 11px 8px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.rp-tab:hover { color: var(--text); }
.rp-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--surface); }
.rp-tab svg { width: 13px; height: 13px; }
.rp-tab .badge {
  background: var(--err);
  color: #fff;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 999px;
  font-weight: 700;
  min-width: 16px;
  text-align: center;
}
.rp-tab .badge.warn { background: var(--warn); }
.rp-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

.rp-empty {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  padding: 30px 8px;
  line-height: 1.5;
}
.rp-empty svg { width: 38px; height: 38px; opacity: .6; margin-bottom: 10px; }

/* Form fields */
.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--surface-2);
  outline: none;
  font-size: 12.5px;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(24,88,191,.12);
}
.field textarea { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-height: 60px; resize: vertical; }
.field .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.cond-row {
  display: grid;
  grid-template-columns: 1fr 50px 1fr 22px;
  gap: 5px;
  align-items: center;
  margin-bottom: 5px;
}
.cond-row input, .cond-row select {
  padding: 5px 7px;
  font-size: 11.5px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: #fff;
}
.cond-row .x-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0;
  display: grid; place-items: center;
}
.cond-row .x-btn:hover { background: var(--err-soft); color: var(--err); border-color: var(--err); }
.add-row-btn {
  font-size: 11px;
  background: var(--primary-soft);
  color: var(--primary);
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px dashed var(--primary);
  margin-top: 4px;
  font-weight: 600;
}

.prop-section {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  margin-top: 14px;
}
.prop-section:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.prop-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-muted);
  margin: 0 0 8px;
}

.prop-summary {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.prop-summary .ps-icon {
  width: 38px; height: 38px;
  border-radius: 9px;
  display: grid; place-items: center;
  background: var(--primary-soft);
  color: var(--primary);
}
.prop-summary .ps-icon svg { width: 18px; height: 18px; }
.prop-summary .ps-type { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: .8px; }
.prop-summary .ps-name { font-weight: 600; font-size: 13px; }

/* Tag table */
.tag-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.tag-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: var(--text-muted);
  padding: 5px 6px;
  border-bottom: 1px solid var(--border);
}
.tag-table td {
  padding: 4px 6px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
}
.tag-table td input {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
  font: inherit;
  padding: 2px 4px;
  border-radius: 4px;
}
.tag-table td input:focus { background: var(--primary-soft); }
.tag-table td input.live {
  background: #E0F4FE;
  border: 1px solid #0EA5E9;
  color: #0C1B33;
  font-weight: 600;
}
.tag-table td input.live:focus {
  box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
}
.tag-table tr.dimmed td { color: var(--text-muted); }
.tag-table tr.row-pv td:nth-child(2) { color: var(--primary); font-weight: 600; }
.tag-add {
  display: grid;
  grid-template-columns: 1fr 80px 28px;
  gap: 4px;
  margin-top: 10px;
}
.tag-add input { padding: 6px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-2); outline: none; font-size: 11.5px; font-family: 'JetBrains Mono', monospace; }
.tag-add .tag-add-btn {
  background: var(--primary); color: #fff; border: none; border-radius: 5px;
  display: grid; place-items: center;
}

/* Coach */
.coach-item {
  display: flex; gap: 10px;
  padding: 10px 11px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .12s;
}
.coach-item:hover { border-color: var(--primary); background: var(--primary-soft); }
.coach-item .ci-ico {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.coach-item .ci-ico svg { width: 14px; height: 14px; }
.coach-item.err .ci-ico { background: var(--err-soft); color: var(--err); }
.coach-item.warn .ci-ico { background: var(--warn-soft); color: var(--warn); }
.coach-item.info .ci-ico { background: var(--primary-soft); color: var(--primary); }
.coach-item.ok .ci-ico { background: var(--ok-soft); color: var(--ok); }
.coach-item .ci-title { font-weight: 600; font-size: 12.5px; line-height: 1.3; }
.coach-item .ci-detail { font-size: 11.5px; color: var(--text-2); margin-top: 3px; line-height: 1.4; }

.coach-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.cs-stat {
  padding: 10px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  text-align: center;
}
.cs-stat .cs-num { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
.cs-stat .cs-lab { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-top: 4px; font-weight: 700; }
.cs-stat.err .cs-num { color: var(--err); }
.cs-stat.warn .cs-num { color: var(--warn); }
.cs-stat.ok .cs-num { color: var(--ok); }

/* ========== Console / log ========== */
.console {
  background: #0B1E3D;
  color: #C5D3EE;
  border-top: 1px solid #1B3565;
  overflow: hidden;
  display: flex; flex-direction: column;
  font-family: 'JetBrains Mono', 'Menlo', monospace;
  font-size: 12px;
  z-index: 5;
}
.console-head {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 14px;
  background: #102849;
  border-bottom: 1px solid #1B3565;
  font-family: 'Inter', system-ui, sans-serif;
}
.console-head .ch-title {
  font-weight: 700;
  font-size: 12px;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .8px;
  display: flex; align-items: center; gap: 7px;
}
.console-head .ch-title svg { width: 13px; height: 13px; color: var(--accent); }
.console-head .ch-tag {
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(0,182,241,.15);
  color: var(--accent-2);
  border: 1px solid rgba(0,182,241,.3);
}
.console-head .ch-actions { margin-left: auto; display: flex; gap: 4px; }
.console-head .ch-actions button {
  background: transparent;
  color: rgba(255,255,255,.6);
  border: 1px solid rgba(255,255,255,.15);
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
}
.console-head .ch-actions button:hover { color: #fff; border-color: rgba(255,255,255,.35); }

.console-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px;
}
.log-line {
  display: grid;
  grid-template-columns: 70px 70px 1fr;
  gap: 10px;
  padding: 2px 0;
  line-height: 1.5;
  border-bottom: 1px solid rgba(255,255,255,.03);
}
.log-line .l-time { color: #7B8DAE; }
.log-line .l-tag {
  font-weight: 700;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: 1px 6px;
  border-radius: 3px;
  text-align: center;
  height: 17px;
}
.log-line .l-tag.info { background: rgba(0,182,241,.15); color: var(--accent-2); }
.log-line .l-tag.exec { background: rgba(52,211,153,.15); color: #6EE7B7; }
.log-line .l-tag.cond { background: rgba(168,85,247,.15); color: #D8B4FE; }
.log-line .l-tag.set  { background: rgba(250,204,21,.15); color: #FDE68A; }
.log-line .l-tag.msg  { background: rgba(255,255,255,.1); color: #fff; }
.log-line .l-tag.err  { background: rgba(248,113,113,.18); color: #FCA5A5; }
.log-line .l-tag.ok   { background: rgba(74,222,128,.18); color: #BBF7D0; }
.log-line .l-msg { color: #DCE6F7; word-break: break-word; }
.log-line .l-msg .hi { color: #FDE68A; font-weight: 700; }
.log-line .l-msg .tag { color: var(--accent-2); }

/* ========== Modal ========== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(11, 30, 60, .55);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadein .15s ease;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff;
  width: 460px;
  max-width: 92vw;
  border-radius: 14px;
  box-shadow: var(--shadow-3);
  overflow: hidden;
  border: 1px solid var(--border);
}
.modal-head {
  padding: 14px 18px;
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
  color: #fff;
  display: flex; align-items: center; gap: 10px;
}
.modal-head .mh-ico {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: rgba(255,255,255,.12);
  display: grid; place-items: center;
}
.modal-head .mh-ico svg { width: 16px; height: 16px; }
.modal-head .mh-type { font-size: 11px; opacity: .7; text-transform: uppercase; letter-spacing: 1.2px; }
.modal-head .mh-title { font-size: 14px; font-weight: 700; }

.modal.alarm .modal-head { background: linear-gradient(180deg, #C0202B 0%, #861818 100%); }
.modal.guidance .modal-head { background: linear-gradient(180deg, #0991C8 0%, #0671A0 100%); }
.modal.confirm .modal-head  { background: linear-gradient(180deg, var(--primary-2) 0%, var(--navy) 100%); }
.modal.error .modal-head    { background: linear-gradient(180deg, #C0202B 0%, #861818 100%); }
.modal.coach .modal-head    { background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%); }

.modal-body {
  padding: 22px 22px 8px;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text);
  max-height: 50vh; overflow-y: auto;
}
.modal-body .m-detail {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface-2);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 12px;
  white-space: pre-wrap;
  border-left: 3px solid var(--primary);
}
.modal-body .m-selection {
  display: grid; gap: 8px; margin-top: 14px;
}
.modal-body .m-selection button {
  text-align: left;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  font-weight: 600;
}

const APP_CONFIG = (() => {
  'use strict';
  return {
    VERSION: '3.0.0',
    DB_NAME: 'ExapilotDB_V3',
    DB_VERSION: 1,
    STORE_FLOWS: 'flows'
  };
})();

const DEBUG_MODULE = (() => {
  'use strict';
  return {
    log(level, module, message, data = {}) {
      const timestamp = new Date().toISOString();
      console[level === 'error' ? 'error' : 'log'](`[${timestamp}] [${module}] ${message}`, data);
    }
  };
})();

const STORAGE_ENGINE = (() => {
  'use strict';
  let db = null;

  const init = () => new Promise((resolve, reject) => {
    const request = indexedDB.open(APP_CONFIG.DB_NAME, APP_CONFIG.DB_VERSION);
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(APP_CONFIG.STORE_FLOWS)) {
        database.createObjectStore(APP_CONFIG.STORE_FLOWS, { keyPath: 'id' });
      }
    };
    request.onsuccess = (e) => { db = e.target.result; resolve(db); };
    request.onerror = (e) => {
      DEBUG_MODULE.log('error', 'STORAGE', 'Failed to open DB', e);
      reject(e);
    };
  });

  const execute = (storeName, mode, operation) => new Promise(async (resolve, reject) => {
    if (!db) await init();
    const tx = db.transaction(storeName, mode);
    const store = tx.objectStore(storeName);
    const request = operation(store);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });

  return {
    async initDB() { await init(); },
    async get(storeName, id) { return execute(storeName, 'readonly', s => s.get(id)); },
    async set(storeName, data) { return execute(storeName, 'readwrite', s => s.put(data)); },
    async getAll(storeName) { return execute(storeName, 'readonly', s => s.getAll()); }
  };
})();
