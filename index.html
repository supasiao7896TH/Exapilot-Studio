/* ===== Sample procedure (simplified version of attached flowchart) ===== */
function buildSampleProcedure() {
  const N = []; const E = [];
  let id = 1;
  const add = (type, x, y, config = {}) => {
    const n = {
      id: 'n' + (id++),
      type,
      x, y,
      config: { ...(NODE_TYPES[type].defaultConfig || {}), ...config }
    };
    N.push(n);
    return n;
  };
  const edge = (from, to, kind = 'out') => {
    E.push({ id: 'e' + Math.random().toString(36).slice(2, 8), from: from.id, to: to.id, kind });
  };

  const start = add('start', 380, 40);
  const adj1  = add('confirm', 340, 140,
    { title: 'ปรับ FC2405', message: 'กรุณาปรับ Setpoint ของ FC2405 ให้พร้อม', kind: 'plain' });
  const t1    = add('timer', 380, 260, { seconds: 3 });
  const cond1 = add('andor', 340, 360, {
    mode: 'AND',
    conditions: [
      { left: 'FC2405.PV', op: '>=', right: '1' },
      { left: 'IZ2404.PV', op: '>=', right: '11' }
    ],
    onError: 'running'
  });
  const setflag = add('output', 340, 510, { outputs: [{ tag: 'SCZ800.IV01', value: '1' }] });
  const out1    = add('blockmode', 340, 620, { modes: [{ tag: 'SCZ800', mode: 'AUT' }] });
  const t2      = add('timer', 380, 730, { seconds: 5 });
  const guide   = add('guidance', 320, 840, { message: 'เริ่ม Stack ถ่ายวัตถุดิบ Silo A', autoClose: true });
  const setSV   = add('output', 340, 950, { outputs: [{ tag: 'FC2405.SV', value: '2500' }] });
  const t3      = add('timer', 380, 1060, { seconds: 5 });
  const cond2   = add('andor', 340, 1170, {
    mode: 'AND',
    conditions: [{ left: 'FC2405.PV', op: '>=', right: '2400' }],
    onError: 'running'
  });
  const flag2   = add('output', 340, 1320, { outputs: [{ tag: 'SCZ800.IV02', value: '1' }] });
  const finish  = add('guidance', 320, 1430, { message: 'Stack Silo A เสร็จสมบูรณ์', autoClose: true });
  const end     = add('end', 400, 1540);

  edge(start, adj1);
  edge(adj1, t1);
  edge(t1, cond1);
  edge(cond1, setflag, 'yes');
  edge(cond1, t1, 'no'); // loop back
  edge(setflag, out1);
  edge(out1, t2);
  edge(t2, guide);
  edge(guide, setSV);
  edge(setSV, t3);
  edge(t3, cond2);
  edge(cond2, flag2, 'yes');
  edge(cond2, t3, 'no');
  edge(flag2, finish);
  edge(finish, end);

  return { nodes: N, edges: E };
}

/* ===== Auto-Generate Flowchart from Wizard Steps ===== */
function generateFlowchartFromWizard(procName, steps) {
  const nodes = [];
  const edges = [];
  let idC = 1;
  const mkNid = () => 'n' + String(idC++).padStart(3, '0');
  const mkEid = () => 'e' + Math.random().toString(36).slice(2, 8);
  const CX = 380;
  const STEP_H = 150;
  let y = 60;

  const addNode = (type, x, yPos, cfg = {}) => {
    const id = mkNid();
    const def = NODE_TYPES[type];
    nodes.push({ id, type, x, y: yPos, config: { ...(def?.defaultConfig || {}), ...cfg } });
    return id;
  };
  const addEdge = (from, to, kind = 'out') => {
    edges.push({ id: mkEid(), from, to, kind });
  };

  const startId = addNode('start', CX, y);
  y += STEP_H;
  let prevId   = startId;
  let prevKind = 'out';
  const noEndTargets = [];

  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];

    if (step.type === 'check_and' || step.type === 'check_or') {
      const mode  = step.type === 'check_and' ? 'AND' : 'OR';
      const conds = (step.conditions && step.conditions.length > 0)
        ? step.conditions : [{ left: '?', op: '>', right: '0' }];
      const condId = addNode('andor', CX - 20, y, { mode, conditions: conds, onError: 'running' });
      addEdge(prevId, condId, prevKind);
      const condY = y;
      y += STEP_H;

      if (step.onNo === 'loop') {
        const timerId = addNode('timer', CX + 260, condY + 5, { seconds: step.waitSec || 10 });
        addEdge(condId, timerId, 'no');
        addEdge(timerId, condId, 'out');
      } else if (step.onNo === 'end') {
        noEndTargets.push(condId);
      }
      prevId = condId; prevKind = 'yes';

    } else if (step.type === 'set_output') {
      const nId = addNode('output', CX, y, { tag: step.tag || '', value: String(step.value ?? '') });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'set_mode') {
      const nId = addNode('blockmode', CX, y, { tag: step.tag || '', mode: step.mode || 'AUT' });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'timer') {
      const nId = addNode('timer', CX, y, { seconds: step.seconds || 10 });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'guidance') {
      const nId = addNode('guidance', CX - 20, y, { message: step.message || '', autoClose: true });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'confirm') {
      const nId = addNode('confirm', CX - 20, y, { title: step.title || 'Confirm', message: step.message || '', kind: 'plain' });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'alarm') {
      const nId = addNode('alarm', CX - 20, y, { message: step.message || '', severity: step.severity || 'HIGH' });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'parallel_split') {
      const nId = addNode('parallel1', CX, y, { connections: step.connections || 5, comment: step.comment || '' });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';

    } else if (step.type === 'parallel_join') {
      const nId = addNode('parallel2', CX, y, { connections: step.connections || 5, joinMode: step.joinMode || 'OR', comment: step.comment || '' });
      addEdge(prevId, nId, prevKind);
      y += STEP_H; prevId = nId; prevKind = 'out';
    }
  }

  const endId = addNode('end', CX + 20, y);
  addEdge(prevId, endId, prevKind);
  noEndTargets.forEach(condId => addEdge(condId, endId, 'no'));

  return { nodes, edges, procName };
}

/* ===== Exapilot execution engine + Coach validator =====
   Pure JS — works on { nodes, edges, tags, vars } state.
   The engine is driven by App via async loop with abort signal.
*/

/* Resolve a token to a value (tag, var, literal number, quoted string). */
function resolveValue(tok, tags, vars) {
  if (tok === undefined || tok === null) return undefined;
  const t = String(tok).trim();
  if (t === '') return '';
  // quoted string
  if ((t.startsWith('"') && t.endsWith('"')) || (t.startsWith("'") && t.endsWith("'"))) {
    return t.slice(1, -1);
  }
  // number literal
  if (/^-?\d+(\.\d+)?$/.test(t)) return parseFloat(t);
  // tag
  if (tags && Object.prototype.hasOwnProperty.call(tags, t)) {
    return tags[t].value;
  }
  // var
  if (vars && Object.prototype.hasOwnProperty.call(vars, t)) {
    return vars[t].value;
  }
  return t; // fallback string
}

function isTagName(t) {
  if (!t) return false;
  // DCS-style tag names have at least one dot or all upper with no @ prefix
  if (t.startsWith('@')) return false;
  return /^[A-Z][A-Z0-9_]*\.[A-Z0-9_]+$/i.test(t);
}

/* Evaluate one AND/OR condition row */
function evalCondition(cond, tags, vars) {
  const L = resolveValue(cond.left, tags, vars);
  const R = resolveValue(cond.right, tags, vars);
  const ln = Number(L), rn = Number(R);
  const bothNum = !isNaN(ln) && !isNaN(rn);
  switch (cond.op) {
    case '==': return bothNum ? ln === rn : String(L) === String(R);
    case '!=': return bothNum ? ln !== rn : String(L) !== String(R);
    case '>':  return bothNum && ln > rn;
    case '>=': return bothNum && ln >= rn;
    case '<':  return bothNum && ln < rn;
    case '<=': return bothNum && ln <= rn;
    default:   return false;
  }
}

/* Simple calculator (sandboxed) */
function calcExpr(expr, tags, vars) {
  if (!expr) return 0;
  // replace tag/var refs with literal values
  const replaced = expr.replace(/[@A-Za-z_][@A-Za-z0-9_.]*/g, (m) => {
    // built-in funcs
    if (['sqrt','pow','exp','log','ln','abs','mod','ceil','floor','round','systime','min','max'].includes(m)) {
      const map = { ln: 'Math.log', log: 'Math.log10', sqrt: 'Math.sqrt', pow: 'Math.pow', exp: 'Math.exp', abs: 'Math.abs', mod: '__mod', ceil: 'Math.ceil', floor: 'Math.floor', round: '__round', systime: '(()=>Date.now()/1000)()', min: 'Math.min', max: 'Math.max' };
      return map[m];
    }
    const v = resolveValue(m, tags, vars);
    return (typeof v === 'number') ? v : 0;
  });
  try {
    // eslint-disable-next-line no-new-func
    const fn = new Function('__mod', '__round', `return (${replaced});`);
    const mod = (x, y) => x % y;
    const rnd = (x, dp) => Number(x).toFixed(dp || 0) * 1;
    const r = fn(mod, rnd);
    return isNaN(r) ? 0 : r;
  } catch (e) {
    return NaN;
  }
}

/* === COACH validator: returns array of issues === */
function validateProcedure(nodes, edges, tags) {
  const issues = [];
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const inDeg = {}, outDeg = {};
  nodes.forEach(n => { inDeg[n.id] = 0; outDeg[n.id] = 0; });
  edges.forEach(e => {
    if (byId[e.to])   inDeg[e.to]   = (inDeg[e.to]   || 0) + 1;
    if (byId[e.from]) outDeg[e.from] = (outDeg[e.from] || 0) + 1;
  });

  const starts = nodes.filter(n => n.type === 'start');
  const ends   = nodes.filter(n => n.type === 'end');

  if (nodes.length === 0) {
    issues.push({ level: 'info', title: 'ผังว่างเปล่า', detail: 'ลาก block จาก palette ทางซ้ายมาวางบน canvas เพื่อเริ่มสร้าง procedure' });
    return issues;
  }
  if (starts.length === 0) {
    issues.push({ level: 'err', title: 'ขาด START', detail: 'ทุก Main Procedure ต้องมี START 1 ตัว — ลาก START จาก palette มาวาง' });
  }
  if (starts.length > 1) {
    issues.push({ level: 'err', title: 'มี START มากกว่า 1', detail: `พบ ${starts.length} ตัว — Exapilot อนุญาตให้มี START เพียงตัวเดียวต่อ procedure`, nodeIds: starts.map(s => s.id) });
  }
  if (ends.length === 0) {
    issues.push({ level: 'warn', title: 'ยังไม่มี END', detail: 'แนะนำให้มี END อย่างน้อย 1 ตัวเพื่อบอก Exapilot ว่าสิ้นสุด procedure' });
  }

  for (const n of nodes) {
    const def = NODE_TYPES[n.type];
    if (!def) continue;

    // input handle but no incoming edge (except START)
    if (def.handles.in && inDeg[n.id] === 0 && n.type !== 'start') {
      issues.push({ level: 'warn', title: `${def.shortLabel} ไม่ได้เชื่อมเข้า`,
        detail: `Block "${nodeLabel(n)}" ไม่มีลูกศรเข้า — จะไม่ถูกเรียก`, nodeIds: [n.id] });
    }

    // outgoing edges expectations
    const outs = edges.filter(e => e.from === n.id);
    if (def.handles.out === 'single' && outs.length === 0 && n.type !== 'end') {
      issues.push({ level: 'warn', title: `${def.shortLabel} ไม่ได้ต่อออก`,
        detail: `Block "${nodeLabel(n)}" ไม่มีลูกศรออก — flow จะหยุดที่ block นี้`, nodeIds: [n.id] });
    }
    if (def.handles.out === 'yes_no') {
      const hasYes = outs.some(e => e.kind === 'yes');
      const hasNo  = outs.some(e => e.kind === 'no');
      if (!hasYes) issues.push({ level: 'err', title: `AND/OR ขาดเส้น YES`, detail: `เงื่อนไขใน "${nodeLabel(n)}" ยังไม่ได้กำหนดเส้น YES`, nodeIds: [n.id] });
      if (!hasNo)  issues.push({ level: 'warn', title: `AND/OR ขาดเส้น NO`, detail: `ควรกำหนดเส้น NO เพื่อจัดการกรณีเงื่อนไขไม่ผ่าน (เช่น loop กลับไป timer)`, nodeIds: [n.id] });
    }

    // node-specific
    if (n.type === 'andor' || n.type === 'and' || n.type === 'or') {
      const conds = n.config.conditions || [];
      const typeName = n.type === 'or' ? 'OR' : 'AND';
      if (!conds.length) issues.push({ level: 'err', title: `${typeName} ไม่มีเงื่อนไข`, detail: `เพิ่มอย่างน้อย 1 เงื่อนไขในช่อง Conditions`, nodeIds: [n.id] });
      conds.forEach((c, i) => {
        if (!c.left)  issues.push({ level: 'err', title: `เงื่อนไขที่ ${i+1} ไม่มี Tag`, detail: 'ช่องซ้ายควรเป็นชื่อ tag เช่น FC2405.PV หรือ parameter (@TEMP)', nodeIds: [n.id] });
        if (c.left && isTagName(c.left) && !tags[c.left]) {
          issues.push({ level: 'warn', title: `ไม่พบ tag "${c.left}"`, detail: `tag นี้ยังไม่มีในระบบจำลอง — เพิ่มในแท็บ Tags หรือพิมพ์ชื่อให้ตรง`, nodeIds: [n.id] });
        }
      });
    }
    if (n.type === 'checktime') {
      if (!n.config.timerName) issues.push({ level: 'warn', title: 'Check Time ไม่มีชื่อ Timer', detail: 'ระบุชื่อ timer ให้ตรงกับ Start Timer', nodeIds: [n.id] });
    }
    if (n.type === 'output') {
      const outRows = n.config.outputs || (n.config.tag ? [{ tag: n.config.tag, value: n.config.value }] : []);
      const filledRows = outRows.filter(r => r.tag);
      if (!filledRows.length) {
        issues.push({ level: 'err', title: 'Output ไม่มี Tag', detail: 'ต้องระบุ DCS tag อย่างน้อย 1 แถว', nodeIds: [n.id] });
      } else {
        filledRows.forEach(r => {
          if (!isTagName(r.tag)) issues.push({ level: 'warn', title: `Tag ดูแปลก: ${r.tag}`, detail: `"${r.tag}" ไม่ใช่รูปแบบ tag มาตรฐาน (เช่น FC2405.SV)`, nodeIds: [n.id] });
          if (r.value === '' || r.value === undefined) issues.push({ level: 'err', title: `Output ไม่มีค่า: ${r.tag}`, detail: `ระบุค่าที่จะส่งไปยัง ${r.tag}`, nodeIds: [n.id] });
          if (tags[r.tag] && tags[r.tag].type === 'text') issues.push({ level: 'warn', title: 'Output to PCS ใช้กับค่า text ไม่ได้', detail: `tag ${r.tag} เป็นชนิด text — ใช้ Block Mode Setting แทน`, nodeIds: [n.id] });
        });
      }
    }
    if (n.type === 'timer') {
      const s = Number(n.config.seconds);
      if (!s || s <= 0) issues.push({ level: 'warn', title: 'Timer = 0', detail: 'ใส่ค่าเวลามากกว่า 0 วินาที', nodeIds: [n.id] });
    }
    if (n.type === 'subst') {
      if (!n.config.left) issues.push({ level: 'err', title: 'Substitution ขาดด้านซ้าย', detail: 'ระบุชื่อตัวแปร (เช่น @TEMP) ที่จะรับค่า', nodeIds: [n.id] });
      if (n.config.left && isTagName(n.config.left)) issues.push({ level: 'warn', title: 'ห้ามใช้ Substitution กับ PCS tag', detail: `${n.config.left} ดูเหมือน DCS tag — ให้ใช้ Output to PCS แทน`, nodeIds: [n.id] });
    }
    if (n.type === 'confirm' || n.type === 'guidance' || n.type === 'alarm') {
      if (!n.config.message) issues.push({ level: 'warn', title: `${def.shortLabel} ไม่มีข้อความ`, detail: 'ระบุข้อความที่จะแสดงต่อ operator', nodeIds: [n.id] });
      if (n.config.message && n.config.message.length > 200) issues.push({ level: 'info', title: 'ข้อความยาวมาก', detail: 'พิจารณาตัดให้สั้นลง — comment ของ Exapilot ปกติไม่เกิน 32 chars', nodeIds: [n.id] });
    }
    if (n.type === 'blockmode') {
      const modeRows = n.config.modes || (n.config.tag ? [{ tag: n.config.tag, mode: n.config.mode }] : []);
      const filledMode = modeRows.filter(r => r.tag);
      if (!filledMode.length) issues.push({ level: 'err', title: 'Block Mode ขาด tag', detail: 'ระบุชื่อ tag อย่างน้อย 1 แถวที่จะเปลี่ยน mode', nodeIds: [n.id] });
    }
    if (n.type === 'param') {
      if (!n.config.name || !n.config.name.startsWith('@'))
        issues.push({ level: 'warn', title: 'Parameter ควรขึ้นต้นด้วย @', detail: '@A = local, @@A = global, @@@A = procedure server', nodeIds: [n.id] });
    }
  }

  // check reachability from START to END
  if (starts.length === 1 && ends.length >= 1) {
    const visited = new Set();
    const stack = [starts[0].id];
    while (stack.length) {
      const id = stack.pop();
      if (visited.has(id)) continue;
      visited.add(id);
      edges.filter(e => e.from === id).forEach(e => stack.push(e.to));
    }
    if (!ends.some(e => visited.has(e.id))) {
      issues.push({ level: 'err', title: 'START ไปไม่ถึง END', detail: 'ไม่มีเส้นทางจาก START ไปถึง END — ตรวจสอบลูกศรเชื่อมระหว่าง block' });
    }
  }

  if (issues.length === 0) {
    issues.push({ level: 'ok', title: 'พร้อมรัน!', detail: 'Procedure ผ่านการตรวจสอบขั้นต้น — กดปุ่ม ▶ Run เพื่อทดสอบ' });
  }
  return issues;
}

function nodeLabel(n) {
  const def = NODE_TYPES[n.type];
  const desc = def?.describe ? def.describe(n.config) : '';
  return desc || def?.label || n.type;
}

/* === Execution Engine === */
class ExapilotEngine {
  constructor(opts) {
    this.opts = opts; // { nodes, edges, tags, vars, speed, onLog, onState, onConfirm, onAlarm, onGuidance, onDone }
    this.nodes = opts.nodes;
    this.edges = opts.edges;
    this.tags  = JSON.parse(JSON.stringify(opts.tags));
    this.vars  = JSON.parse(JSON.stringify(opts.vars || {}));
    this.byId  = Object.fromEntries(this.nodes.map(n => [n.id, n]));
    this.state = 'idle'; // idle/running/paused/stopped/error/done
    this.currentId = null;
    this.activeEdgeId = null;
    this.statusMap = {}; // id -> 'running' | 'done' | 'error'
    this.trail = [];
    this.speed = opts.speed || 1;
    this.iter = 0;
    this.maxIter = 5000;
    this._abort = false;
    this._pauseGate = null;
  }
  log(tag, msg) {
    const ts = new Date().toTimeString().slice(0, 8);
    this.opts.onLog?.({ time: ts, tag, msg });
  }
  setSpeed(s) { this.speed = s; }
  pushState() {
    this.opts.onState?.({
      state: this.state,
      currentId: this.currentId,
      activeEdgeId: this.activeEdgeId,
      statusMap: { ...this.statusMap },
      tags: { ...this.tags },
      vars: { ...this.vars },
      trail: [...this.trail]
    });
  }
  
  /* --- Live Override for Simulation --- */
  updateTag(name, val) {
    if (this.tags[name]) {
      const v = this.tags[name].type === 'number' && !isNaN(Number(val)) ? Number(val) : val;
      this.tags[name].value = v;
      this.log('info', `🔧 Manual Override: ${name} = ${fmt(v)}`);
      this.pushState();
    }
  }

  async sleep(ms) {
    const real = Math.max(60, ms / Math.max(0.1, this.speed));
    const t0 = Date.now();
    while (!this._abort && Date.now() - t0 < real) {
      if (this.state === 'paused') {
        await this._waitResume();
      }
      await new Promise(r => setTimeout(r, 40));
    }
  }
  async _waitResume() {
    return new Promise(res => { this._pauseGate = res; });
  }
  pause() {
    if (this.state === 'running') {
      this.state = 'paused';
      if (this.currentId) this.statusMap[this.currentId] = 'paused';
      this.log('msg', 'Procedure paused.');
      this.pushState();
    }
  }
  resume() {
    if (this.state === 'paused') {
      this.state = 'running';
      if (this.currentId) this.statusMap[this.currentId] = 'running';
      this.log('msg', 'Procedure resumed.');
      this.pushState();
      this._pauseGate?.(); this._pauseGate = null;
    }
  }
  stop() {
    this._abort = true;
    this.state = 'stopped';
    this.log('msg', 'Procedure stopped by user.');
    this._pauseGate?.(); this._pauseGate = null;
    this.pushState();
  }

  /* main entry */
  async run() {
    const starts = this.nodes.filter(n => n.type === 'start');
    if (starts.length !== 1) {
      this.state = 'error';
      this.log('err', `Cannot start — expected 1 START, found ${starts.length}`);
      this.pushState();
      this.opts.onDone?.('error');
      return;
    }
    this.state = 'running';
    this.log('info', `▶ Starting procedure "${this.opts.procName || 'Main'}"`);
    this.pushState();

    let currentId = starts[0].id;
    while (currentId && !this._abort) {
      if (++this.iter > this.maxIter) {
        this.log('err', `Aborted — too many iterations (${this.maxIter}). Possible infinite loop.`);
        this.state = 'error';
        break;
      }
      if (this.state === 'paused') await this._waitResume();
      if (this._abort) break;

      const node = this.byId[currentId];
      if (!node) { this.log('err', `Node ${currentId} not found`); break; }
      this.currentId = currentId;
      this.statusMap[currentId] = 'running';
      this.trail.push(currentId);
      this.pushState();

      let next = null;
      try {
        next = await this.execute(node);
      } catch (e) {
        this.log('err', `Error in ${node.id}: ${e.message}`);
        this.statusMap[currentId] = 'error';
        this.state = 'error';
        this.pushState();
        break;
      }

      this.statusMap[currentId] = 'done';
      this.pushState();
      await this.sleep(220);

      if (node.type === 'end') {
        this.state = 'done';
        this.log('ok', '■ Procedure finished successfully.');
        this.pushState();
        break;
      }

      if (next) {
        // When a node returns 'out', also accept a 'rep' (Repetition) edge as a valid
        // outgoing path — REP edges are visually distinct loop-back arrows but behave
        // exactly like 'out' edges in the execution engine.
        const edge = this.edges.find(e => e.from === currentId && e.kind === next.kind)
                  || (next.kind === 'out'
                      ? this.edges.find(e => e.from === currentId && e.kind === 'rep')
                      : null);
        if (!edge) {
          if (next.kind === 'out' && next.required !== false) {
            this.log('warn', `${node.type} "${nodeLabel(node)}" has no outgoing edge — stopping.`);
            this.state = 'done';
            break;
          }
          break;
        }
        this.activeEdgeId = edge.id;
        this.pushState();
        await this.sleep(280);
        this.activeEdgeId = null;
        currentId = edge.to;
      } else {
        break;
      }
    }
    if (this.state === 'running') { this.state = 'done'; }
    this.currentId = null;
    this.activeEdgeId = null;
    this.pushState();
    this.opts.onDone?.(this.state);
  }

  /* Execute a single node, return { kind: 'out'|'yes'|'no'|case_value } */
  async execute(n) {
    const def = NODE_TYPES[n.type];
    const label = nodeLabel(n);
    switch (n.type) {
      case 'start':
        this.log('exec', `START — เริ่มทำงาน`);
        return { kind: 'out' };
      case 'end':
        this.log('exec', `END — สิ้นสุด procedure`);
        return null;

      case 'timer': {
        const s = Number(n.config.seconds) || 0;
        this.log('exec', `⏱  รอ ${s} วินาที...`);
        await this.sleep(s * 1000);
        return { kind: 'out' };
      }

      case 'andor': {
        const conds = n.config.conditions || [];
        const results = conds.map(c => ({
          c, ok: evalCondition(c, this.tags, this.vars),
          lval: resolveValue(c.left, this.tags, this.vars),
          rval: resolveValue(c.right, this.tags, this.vars)
        }));
        const passes = n.config.mode === 'OR' ? results.some(r => r.ok) : results.every(r => r.ok);
        const summary = results.map(r => `${r.c.left}(${fmt(r.lval)}) ${r.c.op} ${r.c.right} → ${r.ok ? '✓' : '✗'}`).join(`  ${n.config.mode === 'OR' ? 'OR' : 'AND'}  `);
        this.log('cond', `${n.config.mode || 'AND'} : ${summary}  ⇒  ${passes ? 'YES' : 'NO'}`);
        return { kind: passes ? 'yes' : 'no' };
      }

      case 'and': {
        const conds = n.config.conditions || [];
        const results = conds.map(c => ({ c, ok: evalCondition(c, this.tags, this.vars) }));
        const passes = results.every(r => r.ok);
        this.log('cond', `AND: ${results.map(r=>`${r.c.left} ${r.c.op} ${r.c.right}→${r.ok?'✓':'✗'}`).join(' ∧ ')}  ⇒ ${passes?'YES':'NO'}`);
        return { kind: passes ? 'yes' : 'no' };
      }

      case 'or': {
        const conds = n.config.conditions || [];
        const results = conds.map(c => ({ c, ok: evalCondition(c, this.tags, this.vars) }));
        const passes = results.some(r => r.ok);
        this.log('cond', `OR: ${results.map(r=>`${r.c.left} ${r.c.op} ${r.c.right}→${r.ok?'✓':'✗'}`).join(' ∨ ')}  ⇒ ${passes?'YES':'NO'}`);
        return { kind: passes ? 'yes' : 'no' };
      }

      case 'starttimer': {
        const nm = n.config.timerName || 'T1';
        this.vars[`__tmr_${nm}`] = { value: Date.now(), type: 'Float' };
        this.log('exec', `▶ Timer ${nm} started (preset=${n.config.preset||0}s)`);
        return { kind: 'out' };
      }
      case 'stoptimer': {
        const nm = n.config.timerName || 'T1';
        delete this.vars[`__tmr_${nm}`];
        this.log('exec', `■ Timer ${nm} stopped`);
        return { kind: 'out' };
      }
      case 'pausetimer': {
        const nm = n.config.timerName || 'T1';
        const t = this.vars[`__tmr_${nm}`];
        if (t) this.vars[`__tmr_${nm}_elapsed`] = { value: (Date.now() - t.value) / 1000, type: 'Float' };
        this.log('exec', `⏸ Timer ${nm} paused`);
        return { kind: 'out' };
      }
      case 'restarttimer': {
        const nm = n.config.timerName || 'T1';
        this.vars[`__tmr_${nm}`] = { value: Date.now(), type: 'Float' };
        delete this.vars[`__tmr_${nm}_elapsed`];
        this.log('exec', `↺ Timer ${nm} restarted`);
        return { kind: 'out' };
      }
      case 'checktime': {
        const nm = n.config.timerName || 'T1';
        const threshold = Number(n.config.threshold) || 0;
        const t = this.vars[`__tmr_${nm}`];
        const alreadyElapsed = this.vars[`__tmr_${nm}_elapsed`]?.value || 0;
        const elapsed = t ? alreadyElapsed + (Date.now() - t.value) / 1000 : alreadyElapsed;
        const passes = elapsed >= threshold;
        this.log('cond', `CHK ${nm}: elapsed=${elapsed.toFixed(1)}s threshold=${threshold}s → ${passes ? 'YES' : 'NO'}`);
        return { kind: passes ? 'yes' : 'no' };
      }
      case 'inputconn':
        this.log('exec', `← Connector IN "${n.config.connName || 'A'}"`);
        return { kind: 'out' };
      case 'outputconn':
        this.log('exec', `→ Connector OUT "${n.config.connName || 'A'}"`);
        return { kind: 'out' };
      case 'parallel1': {
        const conn1 = n.config.connections || 5;
        this.log('exec', `⇶ Parallel Split  (${conn1} connection points)`);
        return { kind: 'out' };
      }
      case 'parallel2': {
        const conn2 = n.config.connections || 5;
        const mode  = n.config.joinMode || 'OR';
        this.log('exec', `⇶ Parallel Join  ${mode}  (${conn2} connection points)${mode === 'AND' ? ' — รอทุกสายเสร็จ' : ' — รอสายใดสายหนึ่งเสร็จ'}`);
        return { kind: 'out' };
      }

      case 'branch': {
        const v = resolveValue(n.config.variable, this.tags, this.vars);
        const match = (n.config.cases || []).find(c => String(c.value) === String(v));
        if (match) {
          this.log('cond', `BRANCH ${n.config.variable}=${fmt(v)} → case "${match.label || match.value}"`);
          return { kind: 'case_' + match.value };
        }
        this.log('cond', `BRANCH ${n.config.variable}=${fmt(v)} → else`);
        return { kind: 'else' };
      }

      case 'output': {
        // Backward compat: support old single-tag config { tag, value } and new { outputs: [...] }
        const rows = n.config.outputs || (n.config.tag ? [{ tag: n.config.tag, value: n.config.value }] : []);
        if (!rows.length || !rows[0].tag) throw new Error('Output to PCS: no tag specified');
        for (const row of rows) {
          if (!row.tag) continue;
          const val = resolveValue(row.value, this.tags, this.vars);
          const num = Number(val);
          if (isNaN(num)) throw new Error(`Output value "${val}" for tag "${row.tag}" is not a number`);
          if (!this.tags[row.tag]) this.tags[row.tag] = { value: 0, type: 'number', desc: '(auto)' };
          const prev = this.tags[row.tag].value;
          this.tags[row.tag].value = num;
          this.log('set', `📡 PCS: ${row.tag} : ${fmt(prev)} → ${fmt(num)}`);
        }
        return { kind: 'out' };
      }

      case 'blockmode': {
        // Backward compat: support old single-tag config { tag, mode } and new { modes: [...] }
        const rows = n.config.modes || (n.config.tag ? [{ tag: n.config.tag, mode: n.config.mode }] : []);
        if (!rows.length || !rows[0].tag) throw new Error('Block Mode: no tag specified');
        for (const row of rows) {
          if (!row.tag) continue;
          const modeKey = row.tag.includes('.') ? row.tag : `${row.tag}.MODE`;
          if (!this.tags[modeKey]) this.tags[modeKey] = { value: 'MAN', type: 'text', desc: '(auto)' };
          const prev = this.tags[modeKey].value;
          this.tags[modeKey].value = row.mode || 'AUT';
          this.log('set', `🔧 MODE: ${modeKey} : "${prev}" → "${row.mode || 'AUT'}"`);
        }
        return { kind: 'out' };
      }

      case 'subst': {
        const L = n.config.left;
        if (!L) throw new Error('Substitution: no target');
        const val = resolveValue(n.config.right, this.tags, this.vars);
        if (L.startsWith('@')) {
          if (!this.vars[L]) this.vars[L] = { value: 0, type: typeof val === 'number' ? 'Float' : 'Char' };
          const prev = this.vars[L].value;
          this.vars[L].value = val;
          this.log('set', `📝 VAR: ${L} : ${fmt(prev)} → ${fmt(val)}`);
        } else {
          this.vars[L] = { value: val, type: 'auto' };
          this.log('set', `📝 ${L} ← ${fmt(val)}`);
        }
        return { kind: 'out' };
      }

      case 'calc': {
        const L = n.config.left;
        if (!L) throw new Error('Calc: no target');
        const v = calcExpr(n.config.expr, this.tags, this.vars);
        if (L.startsWith('@')) {
          if (!this.vars[L]) this.vars[L] = { value: 0, type: 'Float' };
          this.vars[L].value = v;
        } else if (this.tags[L]) {
          this.tags[L].value = v;
        } else {
          this.vars[L] = { value: v, type: 'Float' };
        }
        this.log('set', `∑ CALC: ${L} ← ${n.config.expr} = ${fmt(v)}`);
        return { kind: 'out' };
      }

      case 'confirm': {
        this.log('msg', `💬 รอ operator ยืนยัน: "${n.config.message}"`);
        const ok = await this.opts.onConfirm?.(n.config);
        if (ok === false) {
          this.log('warn', `Operator ปฏิเสธการยืนยัน — หยุด procedure`);
          throw new Error('Operator cancelled confirmation');
        }
        this.log('ok', `✓ ยืนยันแล้ว`);
        return { kind: 'out' };
      }

      case 'guidance': {
        this.log('msg', `ℹ Guidance: "${n.config.message}"`);
        await this.opts.onGuidance?.(n.config);
        return { kind: 'out' };
      }

      case 'alarm': {
        this.log('err', `🚨 ALARM (${n.config.severity}): "${n.config.message}"`);
        await this.opts.onAlarm?.(n.config);
        return { kind: 'out' };
      }

      case 'parallel':
        this.log('exec', `⇶ Parallel join`);
        return { kind: 'out' };

      case 'subproc':
        this.log('exec', `↘ Call sub-procedure: ${n.config.name} (simulated)`);
        await this.sleep(400);
        this.log('exec', `↖ Return from ${n.config.name}`);
        return { kind: 'out' };

      case 'param': {
        const nm = n.config.name;
        if (nm) {
          this.vars[nm] = { value: n.config.initial, type: n.config.type || 'Float' };
          this.log('set', `📐 Declare ${nm} : ${n.config.type} = ${fmt(n.config.initial)}`);
        }
        return { kind: 'out' };
      }

      default:
        this.log('exec', `... ${def?.label || n.type}`);
        return { kind: 'out' };
    }
  }
}

function fmt(v) {
  if (typeof v === 'number') {
    if (Number.isInteger(v)) return String(v);
    return v.toFixed(2);
  }
  if (typeof v === 'string') return `"${v}"`;
  return String(v);
}

/* ===== Canvas component =====
   Handles: pan, zoom, drag-place from palette, move nodes, draw edges,
   click-to-connect handles, click select, delete, etc.
*/


/* Compute handle absolute positions on a node */
function handlePos(node, handle, portIndex = 0, totalPorts = 1) {
  const w = node._w || 160, h = node._h || 80;
  // For multi-port handles (parallel blocks): distribute evenly across bar width
  const xForPort = (idx, n) => node.x + (w / (n + 1)) * (idx + 1);
  switch (handle) {
    case 'in':
    case 'top':    return { x: totalPorts > 1 ? xForPort(portIndex, totalPorts) : node.x + w / 2, y: node.y };
    case 'out':
    case 'bottom': return { x: totalPorts > 1 ? xForPort(portIndex, totalPorts) : node.x + w / 2, y: node.y + h };
    case 'yes':    return { x: node.x + w * 0.3, y: node.y + h };
    case 'no':     return { x: node.x + w * 0.7, y: node.y + h };
    case 'rep':
    case 'left':   return { x: node.x,     y: node.y + h / 2 };
    case 'right':  return { x: node.x + w, y: node.y + h / 2 };
    default:       return { x: node.x + w / 2, y: node.y + h };
  }
}

/* Map handle name → physical side for routing */
function handleToSide(handle) {
  switch (handle) {
    case 'in':
    case 'top':    return 'top';
    case 'yes':
    case 'no':
    case 'out':
    case 'bottom': return 'bottom';
    case 'rep':
    case 'left':   return 'left';
    case 'right':  return 'right';
    default:       return 'bottom';
  }
}

/* 4-Side Orthogonal Path Routing — handles top/bottom/left/right exits & entries */
function getOrthogonalPath(p1, p2, kind, offsetX = 0, offsetY = 0, fromSide = 'bottom', toSide = 'top') {
  const STUB = 26; // pixels to travel straight out of node before turning

  // REP edges use the same orthogonal routing as any other edge —
  // the connection point is wherever the user drew it (fromSide/toSide preserved).
  const isFromV = fromSide === 'top' || fromSide === 'bottom';
  const isToV   = toSide   === 'top' || toSide   === 'bottom';

  // Backward flow (loop upward) when both exits are vertical and target is above source
  if (isFromV && isToV && p2.y < p1.y + 20) {
    const outY = p1.y + 30 + offsetY;
    const midX = Math.min(p1.x, p2.x) - 100 + offsetX;
    const inY  = p2.y - 30;
    return { d: `M ${p1.x} ${p1.y} V ${outY} H ${midX} V ${inY} H ${p2.x} V ${p2.y}`,
             midX, midY: (outY + inY) / 2 };
  }

  let d, midX, midY;

  if (isFromV && isToV) {
    // ── Vertical ↔ Vertical: 5-segment V-H-V-H-V ──
    const Ay = fromSide === 'bottom' ? p1.y + STUB + offsetY : p1.y - STUB + offsetY;
    const By = toSide   === 'top'    ? p2.y - STUB            : p2.y + STUB;
    const cX = (p1.x + p2.x) / 2 + offsetX;
    const safeAy = fromSide === 'bottom' ? Math.max(Ay, p1.y + 10) : Math.min(Ay, p1.y - 10);
    const safeBy = toSide   === 'top'    ? Math.min(By, p2.y - 10) : Math.max(By, p2.y + 10);
    midX = cX; midY = (safeAy + safeBy) / 2;
    d = `M ${p1.x} ${p1.y} V ${safeAy} H ${cX} V ${safeBy} H ${p2.x} V ${p2.y}`;

  } else if (!isFromV && !isToV) {
    // ── Horizontal ↔ Horizontal: 5-segment H-V-H-V-H ──
    const Ax = fromSide === 'right' ? p1.x + STUB + offsetX : p1.x - STUB + offsetX;
    const Bx = toSide   === 'left'  ? p2.x - STUB            : p2.x + STUB;
    const cY = (p1.y + p2.y) / 2 + offsetY;
    midX = (Ax + Bx) / 2; midY = cY;
    d = `M ${p1.x} ${p1.y} H ${Ax} V ${cY} H ${Bx} V ${p2.y} H ${p2.x}`;

  } else if (isFromV && !isToV) {
    // ── Vertical exit → Horizontal entry: L-shape V-H ──
    const cY = p2.y + offsetY;
    midX = (p1.x + p2.x) / 2; midY = cY;
    d = `M ${p1.x} ${p1.y} V ${cY} H ${p2.x}`;

  } else {
    // ── Horizontal exit → Vertical entry: L-shape H-V ──
    const cX = p2.x + offsetX;
    midX = cX; midY = (p1.y + p2.y) / 2;
    d = `M ${p1.x} ${p1.y} H ${cX} V ${p2.y}`;
  }

  return { d, midX, midY };
}

function NodeView({ node, selected, status, onMouseDown, onSelect, onDelete, onHandleClick, connecting, onMeasure }) {
  const def = NODE_TYPES[node.type];
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      const r = ref.current.getBoundingClientRect();
      onMeasure(node.id, r.width, r.height);
    }
  }, [node.id, node.config, node.type, onMeasure]);

  const desc = def.describe ? def.describe(node.config) : '';
  // For parallel2 OR-mode: add para-or class for cyan-green rail color
  const isParallelOr = node.type === 'parallel2' && (node.config.joinMode || 'OR') === 'OR';
  const cls = [
    'node',
    `cat-${def.cat}`,
    `shape-${def.shape}`,
    isParallelOr ? 'para-or' : '',
    selected ? 'selected' : '',
    status === 'running' ? 'running' : '',
    status === 'paused' ? 'paused' : '',
    status === 'done' ? 'done' : '',
    status === 'error' ? 'error' : '',
  ].join(' ');

  return (
    <div className={cls} style={{ left: node.x, top: node.y }}
         onMouseDown={(e) => { e.stopPropagation(); onSelect(node.id); onMouseDown(e, node.id); }}
         onClick={(e) => e.stopPropagation()}>
      <div className="node-body" ref={ref}>
        <div className="node-side-stripe"></div>
        {def.shape !== 'parallel' && (
          <div className="node-head">
            <div className="nh-icon">{def.icon}</div>
            <div className="nh-type">{def.shortLabel}</div>
            <div className="nh-status"></div>
          </div>
        )}
        {/* Parallel block: show connection-point ticks + join-mode label */}
        {def.shape === 'parallel' && (() => {
          const conn = node.config.connections || 5;
          return (
            <div style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{display:'flex',justifyContent:'space-evenly',width:'100%',marginBottom:1}}>
                {Array.from({length:conn}).map((_,i)=>(
                  <span key={i} style={{width:5,height:5,background:'#1a6eaf',border:'1.5px solid #5BD0FF',borderRadius:1,display:'inline-block'}}/>
                ))}
              </div>
              <div className="node-title" style={{margin:'2px 0'}}>
                {node.type === 'parallel2' ? (node.config.joinMode || 'OR') : ''}
                {node.config.comment ? ` — ${node.config.comment}` : ''}
              </div>
              <div style={{display:'flex',justifyContent:'space-evenly',width:'100%',marginTop:1}}>
                {Array.from({length:conn}).map((_,i)=>(
                  <span key={i} style={{width:5,height:5,background:'#1a6eaf',border:'1.5px solid #5BD0FF',borderRadius:1,display:'inline-block'}}/>
                ))}
              </div>
            </div>
          );
        })()}
        {def.shape !== 'parallel' && (
          <div className="node-title">{node.config.comment || node.config.title || node.config.name || node.config.message || def.label}</div>
        )}
        {def.shape !== 'parallel' && desc && <div className="node-meta">{desc}</div>}
        <div className="node-actions">
          <button title="ลบ" onClick={(e) => { e.stopPropagation(); onDelete(node.id); }}>{Icon.x}</button>
        </div>
        {/* ── Parallel block: 5 input handles (top bar) + 5 output handles (bottom bar) ── */}
        {def.shape === 'parallel' ? (
          <>
            {Array.from({ length: 5 }).map((_, i) => (
              <div key={`pi${i}`}
                   className={`handle h-para-in ${connecting?.fromNode === node.id ? '' : ''} ${connecting && connecting.fromNode !== node.id && connecting.toPort === i ? 'connecting' : ''}`}
                   style={{ position:'absolute', top:-5, left:`${(i+1) * (100/6)}%`, transform:'translateX(-50%)', zIndex:4 }}
                   onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'in', i, e); }}/>
            ))}
            {Array.from({ length: 5 }).map((_, i) => (
              <div key={`po${i}`}
                   className={`handle h-para-out ${connecting?.fromNode === node.id && connecting?.fromPort === i ? 'connecting' : ''}`}
                   style={{ position:'absolute', bottom:-5, left:`${(i+1) * (100/6)}%`, transform:'translateX(-50%)', zIndex:4 }}
                   onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'out', i, e); }}/>
            ))}
          </>
        ) : (
          <>
            {def.handles.in && (
              <div className={`handle h-in ${connecting && connecting.fromNode !== node.id ? 'connecting' : ''}`}
                   onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'in', 0, e); }}/>
            )}
            {def.handles.out === 'single' && (
              <div className={`handle h-out ${connecting?.fromNode === node.id && connecting?.fromHandle === 'out' ? 'connecting' : ''}`}
                   onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'out', 0, e); }}/>
            )}
            {def.handles.out === 'yes_no' && (
              <>
                <div className={`handle h-yes ${connecting?.fromNode === node.id && connecting?.fromHandle === 'yes' ? 'connecting' : ''}`}
                     onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'yes', 0, e); }}/>
                <div className={`handle h-no ${connecting?.fromNode === node.id && connecting?.fromHandle === 'no' ? 'connecting' : ''}`}
                     onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'no', 0, e); }}/>
              </>
            )}
            {def.handles.out === 'parallel_out' && (
              <div className={`handle h-out ${connecting?.fromNode === node.id && connecting?.fromHandle === 'out' ? 'connecting' : ''}`}
                   onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'out', 0, e); }}/>
            )}
            {def.handles.out === 'rep' && (
              <>
                <div className={`handle h-out ${connecting?.fromNode === node.id && connecting?.fromHandle === 'out' ? 'connecting' : ''}`}
                     onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'out', 0, e); }}/>
                <div className={`handle h-rep ${connecting?.fromNode === node.id && connecting?.fromHandle === 'rep' ? 'connecting' : ''}`}
                     onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'rep', 0, e); }}/>
                <div className="handle-label rep">REP</div>
              </>
            )}
            {/* ── 4-side: LEFT and RIGHT handles on every non-parallel block ── */}
            <div className={`handle h-left ${
              connecting?.fromNode === node.id && connecting?.fromHandle === 'left'
                ? 'connecting'
                : connecting && connecting.fromNode !== node.id
                  ? 'connecting'   // show as valid target when another node is being connected
                  : ''
            }`}
                 title="Left connection"
                 onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'left', 0, e); }}/>
            <div className={`handle h-right ${
              connecting?.fromNode === node.id && connecting?.fromHandle === 'right'
                ? 'connecting'
                : connecting && connecting.fromNode !== node.id
                  ? 'connecting'   // show as valid target when another node is being connected
                  : ''
            }`}
                 title="Right connection"
                 onMouseDown={(e) => { e.stopPropagation(); onHandleClick(node.id, 'right', 0, e); }}/>
          </>
        )}
      </div>
    </div>
  );
}

function Canvas({
  nodes, edges, selected, statusMap, activeEdgeId, currentId,
  onSelect, onMove, onDelete, onAddNode, onConnect, onDeleteEdge,
  onCanvasClick, onEdgeMove, onEdgeUpdateKind
}) {
  const containerRef = useRef(null);
  const wrapRef = useRef(null);
  const [view, setView] = useState({ x: 60, y: 40, k: 1 });
  const [dragNode, setDragNode] = useState(null); // {id, dx, dy}
  const [dragEdge, setDragEdge] = useState(null); // {id, lastX, lastY}
  const [panning, setPanning] = useState(null);   // {x0, y0, vx0, vy0}
  const [connecting, setConnecting] = useState(null); // {fromNode, fromHandle, mouseX, mouseY}
  const [sizes, setSizes] = useState({});
  const [edgeContextMenu, setEdgeContextMenu] = useState(null); // { x: number, y: number, edgeId: string }

  // attach node sizes (memoized to prevent edgePaths re-calculation on unrelated renders)
  const enrichedNodes = useMemo(
    () => nodes.map(n => ({ ...n, _w: sizes[n.id]?.w || 160, _h: sizes[n.id]?.h || 80 })),
    [nodes, sizes]
  );

  const setSize = useCallback((id, w, h) => {
    setSizes(s => (s[id]?.w === w && s[id]?.h === h) ? s : { ...s, [id]: { w, h } });
  }, []);

  /* coords helpers */
  const screenToCanvas = (sx, sy) => {
    const r = containerRef.current.getBoundingClientRect();
    return { x: (sx - r.left - view.x) / view.k, y: (sy - r.top - view.y) / view.k };
  };

  /* Node drag */
  const onNodeMouseDown = (e, id) => {
    if (e.button !== 0) return;
    const node = nodes.find(n => n.id === id);
    if (!node) return;
    const c = screenToCanvas(e.clientX, e.clientY);
    setDragNode({ id, dx: c.x - node.x, dy: c.y - node.y });
  };

  /* Edge drag (Waypoint) */
  const onEdgeMouseDown = (e, id) => {
    if (e.button !== 0) return;
    e.stopPropagation();
    const c = screenToCanvas(e.clientX, e.clientY);
    setDragEdge({ id, lastX: c.x, lastY: c.y });
  };

  /* Pan */
  const onContainerMouseDown = (e) => {
    setEdgeContextMenu(null);
    if (e.button === 0 && !e.target.closest('.node, .handle')) {
      // start pan
      setPanning({ x0: e.clientX, y0: e.clientY, vx0: view.x, vy0: view.y });
      onSelect(null);
      if (connecting) setConnecting(null);
    }
  };

  // global mouse move/up
  useEffect(() => {
    const mm = (e) => {
      if (dragNode) {
        const c = screenToCanvas(e.clientX, e.clientY);
        onMove(dragNode.id, c.x - dragNode.dx, c.y - dragNode.dy);
      }
      if (dragEdge && onEdgeMove) {
        const c = screenToCanvas(e.clientX, e.clientY);
        onEdgeMove(dragEdge.id, c.x - dragEdge.lastX, c.y - dragEdge.lastY);
        setDragEdge({ id: dragEdge.id, lastX: c.x, lastY: c.y });
      }
      if (panning) {
        setView(v => ({ ...v, x: panning.vx0 + (e.clientX - panning.x0), y: panning.vy0 + (e.clientY - panning.y0) }));
      }
      if (connecting) {
        const c = screenToCanvas(e.clientX, e.clientY);
        setConnecting(s => s && ({ ...s, mouseX: c.x, mouseY: c.y }));
      }
    };
    const mu = () => {
      setDragNode(null);
      setDragEdge(null);
      setPanning(null);
    };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
    return () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
  }, [dragNode, panning, connecting, view, dragEdge, onEdgeMove]);

  /* Wheel zoom */
  const onWheel = (e) => {
    const r = containerRef.current.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    setView(v => {
      const newK = Math.max(0.3, Math.min(2.5, v.k * factor));
      // zoom around cursor
      const dx = (cx - v.x) * (newK / v.k - 1);
      const dy = (cy - v.y) * (newK / v.k - 1);
      return { x: v.x - dx, y: v.y - dy, k: newK };
    });
  };

  /* DnD from palette */
  const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
  const onDrop = (e) => {
    e.preventDefault();
    const type = e.dataTransfer.getData('text/exapilot-node');
    if (!type) return;
    const c = screenToCanvas(e.clientX, e.clientY);
    onAddNode(type, c.x - 80, c.y - 40);
  };

  /* Handle connection */
  const onHandleClick = (nodeId, handle, portIndex, e) => {
    e.stopPropagation();
    const node = nodes.find(n => n.id === nodeId);
    const def = NODE_TYPES[node?.type];
    const isParallel = def?.shape === 'parallel';
    const totalPorts = isParallel ? 5 : 1;

    if (!connecting) {
      // Any handle can now start a connection (4-side freedom)
      const p = handlePos(
        { ...node, _w: sizes[nodeId]?.w || 160, _h: sizes[nodeId]?.h || 80 },
        handle, portIndex, totalPorts
      );
      const fromSide = handleToSide(handle);
      setConnecting({ fromNode: nodeId, fromHandle: handle, fromPort: portIndex, fromSide, mouseX: p.x, mouseY: p.y });
    } else {
      // Complete connection — any handle on a different node is a valid target
      if (nodeId !== connecting.fromNode) {
        const toSide = handleToSide(handle);
        onConnect(
          connecting.fromNode, nodeId,
          connecting.fromHandle, connecting.fromPort ?? 0, portIndex ?? 0,
          connecting.fromSide, toSide,
          handle   // ← toHandle: the actual handle clicked on the target node
        );
      }
      setConnecting(null);
    }
  };

  // ESC cancels connection
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { setConnecting(null); onSelect(null); setDragEdge(null); setEdgeContextMenu(null); }
      if ((e.key === 'Delete' || e.key === 'Backspace') && selected && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        onDelete(selected);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [selected, connecting]);

  /* Edges */
  const edgePaths = useMemo(() => {
    return edges.map(e => {
      const from = enrichedNodes.find(n => n.id === e.from);
      const to   = enrichedNodes.find(n => n.id === e.to);
      if (!from || !to) return null;
      const fromIsParallel = NODE_TYPES[from.type]?.shape === 'parallel';
      const toIsParallel   = NODE_TYPES[to.type]?.shape === 'parallel';

      // Determine which handle was used (stored in edge, fallback to semantic default)
      const outHandle = e.fromHandle || (e.kind === 'yes' ? 'yes' : e.kind === 'no' ? 'no' : 'out');
      const inHandle  = e.toHandle   || 'in';
      const fromSide  = e.fromSide   || handleToSide(outHandle);
      const toSide    = e.toSide     || handleToSide(inHandle);

      const p1 = handlePos(from, outHandle, e.fromPort ?? 0, fromIsParallel ? 5 : 1);
      const p2 = handlePos(to,   inHandle,  e.toPort   ?? 0, toIsParallel   ? 5 : 1);

      const pathData = getOrthogonalPath(p1, p2, e.kind, e.offsetX || 0, e.offsetY || 0, fromSide, toSide);
      return {
        ...e,
        d: pathData.d,
        labelPos: { x: pathData.midX, y: pathData.midY },
        active: activeEdgeId === e.id
      };
    }).filter(Boolean);
  }, [edges, enrichedNodes, activeEdgeId]);

  /* Zoom HUD actions */
  const zoomIn  = () => setView(v => ({ ...v, k: Math.min(2.5, v.k * 1.2) }));
  const zoomOut = () => setView(v => ({ ...v, k: Math.max(0.3, v.k * 0.85) }));
  const fitView = () => {
    if (nodes.length === 0) { setView({ x: 60, y: 40, k: 1 }); return; }
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const xMax = Math.max(...nodes.map(n => n.x + (sizes[n.id]?.w || 160)));
    const yMax = Math.max(...nodes.map(n => n.y + (sizes[n.id]?.h || 80)));
    const xMin = Math.min(...xs);
    const yMin = Math.min(...ys);
    const r = containerRef.current.getBoundingClientRect();
    const pad = 60;
    const w = xMax - xMin + pad * 2;
    const h = yMax - yMin + pad * 2;
    const k = Math.min(r.width / w, r.height / h, 1.2);
    setView({ k, x: -xMin * k + pad, y: -yMin * k + pad });
  };

  return (
    <div className="canvas-container" ref={containerRef}
         onMouseDown={onContainerMouseDown}
         onWheel={onWheel}
         onDragOver={onDragOver}
         onDrop={onDrop}>
      <div className="canvas-wrap" ref={wrapRef}
           style={{ transform: `translate(${view.x}px, ${view.y}px) scale(${view.k})` }}>

        <svg className="edges-svg">
          <defs>
            <marker id="arrow"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#97A8C5"/>
            </marker>
            <marker id="arrow-yes" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
            </marker>
            <marker id="arrow-no" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
            </marker>
            <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#1858BF"/>
            </marker>
            <marker id="arrow-rep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--warn)"/>
            </marker>
          </defs>
          {edgePaths.map(e => (
            <g key={e.id}>
              {/* Thick transparent helper path for effortless clicking and right-clicking */}
              <path d={e.d} fill="none" stroke="transparent" strokeWidth="12" style={{ cursor: 'pointer', pointerEvents: 'stroke' }}
                    onContextMenu={(ev) => {
                      ev.preventDefault();
                      ev.stopPropagation();
                      const r = containerRef.current.getBoundingClientRect();
                      setEdgeContextMenu({
                        x: ev.clientX - r.left,
                        y: ev.clientY - r.top,
                        edgeId: e.id
                      });
                    }}
                    onClick={(ev) => {
                      ev.stopPropagation();
                    }}
              />

              <path className={`edge-path ${e.kind || ''} ${e.active ? 'active' : ''}`} d={e.d}
                    markerEnd={`url(#${e.active ? 'arrow-active' : e.kind === 'yes' ? 'arrow-yes' : e.kind === 'no' ? 'arrow-no' : e.kind === 'rep' ? 'arrow-rep' : 'arrow'})`}
                    onContextMenu={(ev) => {
                      ev.preventDefault();
                      ev.stopPropagation();
                      const r = containerRef.current.getBoundingClientRect();
                      setEdgeContextMenu({
                        x: ev.clientX - r.left,
                        y: ev.clientY - r.top,
                        edgeId: e.id
                      });
                    }}
                    onClick={(ev) => { ev.stopPropagation(); if (confirm('ลบเส้นเชื่อมนี้?')) onDeleteEdge(e.id); }}/>
              
              {/* Waypoint Drag Handle / Box */}
              <rect x={e.labelPos.x - 5} y={e.labelPos.y - 5} width="10" height="10" 
                    fill="#fff" stroke="var(--primary)" strokeWidth="1.5" rx="2"
                    style={{ cursor: 'move', pointerEvents: 'auto' }}
                    onMouseDown={(ev) => onEdgeMouseDown(ev, e.id)}
                    onContextMenu={(ev) => {
                      ev.preventDefault();
                      ev.stopPropagation();
                      const r = containerRef.current.getBoundingClientRect();
                      setEdgeContextMenu({
                        x: ev.clientX - r.left,
                        y: ev.clientY - r.top,
                        edgeId: e.id
                      });
                    }}
                    title="ลากเพื่อปรับแนวเส้นทางสัญญาณ" />

              {e.kind && e.kind !== 'out' && (
                <text className={`edge-label ${e.kind}`} x={e.labelPos.x} y={e.labelPos.y - 10} textAnchor="middle" style={{ pointerEvents: 'none' }}>
                  {e.kind === 'yes' ? 'YES' : e.kind === 'no' ? 'NO' : e.kind === 'rep' ? 'REP' : ''}
                </text>
              )}
            </g>
          ))}

          {connecting && (() => {
            const fromNode = enrichedNodes.find(n => n.id === connecting.fromNode);
            if (!fromNode) return null;
            const fromIsParallel = NODE_TYPES[fromNode.type]?.shape === 'parallel';
            const p1 = handlePos(fromNode, connecting.fromHandle, connecting.fromPort ?? 0, fromIsParallel ? 5 : 1);
            const p2 = { x: connecting.mouseX, y: connecting.mouseY };
            const fromSide = connecting.fromSide || 'bottom';
            const pathData = getOrthogonalPath(p1, p2, connecting.fromHandle, 0, 0, fromSide, 'top');
            return <path d={pathData.d}
                         stroke="#2A6EE0" strokeWidth="2" strokeDasharray="6 4" fill="none"
                         markerEnd="url(#arrow-active)"/>;
          })()}
        </svg>

        {enrichedNodes.map(n => (
          <NodeView key={n.id} node={n} selected={selected === n.id}
                    status={statusMap?.[n.id]}
                    onMouseDown={onNodeMouseDown}
                    onSelect={onSelect}
                    onDelete={onDelete}
                    onHandleClick={onHandleClick}
                    connecting={connecting}
                    onMeasure={setSize}/>
        ))}
      </div>

      {/* Floating Custom Right-Click Context Menu for Edges */}
      {edgeContextMenu && (
        <div className="custom-context-menu"
             style={{
               position: 'absolute',
               left: edgeContextMenu.x,
               top: edgeContextMenu.y,
               zIndex: 1000,
               background: '#fff',
               border: '1px solid var(--border-strong)',
               boxShadow: 'var(--shadow-2)',
               borderRadius: '4px',
               padding: '4px 0',
               minWidth: '170px'
             }}
             onMouseDown={(e) => e.stopPropagation()}
             onClick={(e) => e.stopPropagation()}
        >
          <div className="context-menu-title" style={{ padding: '6px 14px 4px', fontSize: '10.5px', fontWeight: 'bold', color: 'var(--text-muted)', textTransform: 'uppercase', borderBottom: '1px solid var(--border)', marginBottom: '4px' }}>
            ชนิดสายสัญญาณ
          </div>
          <div className="context-menu-item" onClick={() => { onEdgeUpdateKind(edgeContextMenu.edgeId, 'out'); setEdgeContextMenu(null); }}>
            <span style={{ minWidth: '16px', display: 'inline-block' }}>
              {(edges.find(e => e.id === edgeContextMenu.edgeId)?.kind === 'out' || !edges.find(e => e.id === edgeContextMenu.edgeId)?.kind) ? '✓' : ''}
            </span> 
            Standard (ปกติ)
          </div>
          <div className="context-menu-item" onClick={() => { onEdgeUpdateKind(edgeContextMenu.edgeId, 'yes'); setEdgeContextMenu(null); }}>
            <span style={{ minWidth: '16px', display: 'inline-block', color: 'var(--ok)' }}>
              {edges.find(e => e.id === edgeContextMenu.edgeId)?.kind === 'yes' ? '✓' : ''}
            </span> 
            YES (เงื่อนไขผ่าน)
          </div>
          <div className="context-menu-item" onClick={() => { onEdgeUpdateKind(edgeContextMenu.edgeId, 'no'); setEdgeContextMenu(null); }}>
            <span style={{ minWidth: '16px', display: 'inline-block', color: 'var(--err)' }}>
              {edges.find(e => e.id === edgeContextMenu.edgeId)?.kind === 'no' ? '✓' : ''}
            </span> 
            NO (เงื่อนไขไม่ผ่าน)
          </div>
          <div className="context-menu-item" onClick={() => { onEdgeUpdateKind(edgeContextMenu.edgeId, 'rep'); setEdgeContextMenu(null); }}>
            <span style={{ minWidth: '16px', display: 'inline-block', color: 'var(--warn)' }}>
              {edges.find(e => e.id === edgeContextMenu.edgeId)?.kind === 'rep' ? '✓' : ''}
            </span> 
            Repetition (วนซ้ำ)
          </div>
          <div style={{ height: '1px', background: 'var(--border)', margin: '4px 0' }}></div>
          <div className="context-menu-item danger" style={{ color: 'var(--err)' }} onClick={() => { if (confirm('ลบเส้นเชื่อมนี้?')) onDeleteEdge(edgeContextMenu.edgeId); setEdgeContextMenu(null); }}>
            <span style={{ minWidth: '16px', display: 'inline-block' }}>✕</span> 
            ลบเส้นเชื่อม (Delete)
          </div>
        </div>
      )}

      {nodes.length === 0 && (
        <div className="empty-state">
          <div className="es-card">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{color:'var(--primary)'}}>
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <h3>เริ่มสร้าง Procedure</h3>
            <p>ลาก block จาก palette ทางซ้ายมาวางบน canvas<br/>หรือลองโหลด <span className="es-shortcut" onClick={() => window.__loadSample?.()}>ตัวอย่าง</span> เพื่อดูตัวอย่าง</p>
          </div>
        </div>
      )}

      <div className="canvas-watermark">
        <span className="mw-dot"></span>
        Drag handles to connect · Wheel to zoom · Drag canvas to pan
      </div>

      <div className="canvas-hud">
        <button title="Zoom out" onClick={zoomOut}>{Icon.zoomOut}</button>
        <div className="zlevel">{Math.round(view.k * 100)}%</div>
        <button title="Zoom in" onClick={zoomIn}>{Icon.zoomIn}</button>
        <button title="Fit view" onClick={fitView}>{Icon.fit}</button>
      </div>
    </div>
  );
}

            <label>Mode</label>

          </div>

              <tr key={name} className={running ? 'row-pv' : ''}>

            ))}
          </tbody>
        </table>
        {!running && (
          <div className="tag-add">
            <input placeholder="ชื่อ tag เช่น TIC101.PV" value={t.name} onChange={(e) => setT({ ...t, name: e.target.value })}/>

/* ---------- Palette sidebar ---------- */
function Palette({ filter, onFilter }) {
  return (
    <div className="palette">
      <input className="palette-search" placeholder="🔍 ค้นหา block..." value={filter} onChange={(e) => onFilter(e.target.value)}/>
      {PALETTE.map(group => {
        const items = group.items.filter(id => {
          if (!filter) return true;
          const f = filter.toLowerCase();
          return NODE_TYPES[id].label.toLowerCase().includes(f) ||
                 NODE_TYPES[id].sub.toLowerCase().includes(f) ||
                 NODE_TYPES[id].shortLabel.toLowerCase().includes(f);
        });
        if (items.length === 0) return null;
        return (
          <div key={group.name}>
            <h4>{group.name}</h4>
            {items.map(id => {
              const def = NODE_TYPES[id];
              return (
                <div key={id} className="palette-item"
                     draggable
                     onDragStart={(e) => { e.dataTransfer.setData('text/exapilot-node', id); e.dataTransfer.effectAllowed = 'copy'; }}>
                  <div className="pi-icon">{def.icon}</div>
                  <div>
                    <div className="pi-label">{def.label}</div>
                    <div className="pi-sub">{def.sub}</div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- Console / log ---------- */
function Console({ log, onClear }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [log]);
  return (
    <div className="console">
      <div className="console-head">
        <div className="ch-title">{Icon.spark} Execution Console</div>
        <div className="ch-tag">{log.length} entries</div>
        <div className="ch-actions">
          <button onClick={onClear}>Clear</button>
        </div>
      </div>
      <div className="console-body" ref={ref}>
        {log.length === 0 && <div style={{color:'#7B8DAE',padding:'12px 0',fontSize:12}}>กด ▶ Run เพื่อเริ่มทดสอบ procedure — log การทำงานจะแสดงที่นี่</div>}
        {log.map((l, i) => (
          <div key={i} className="log-line">
            <div className="l-time">{l.time}</div>
            <div className={`l-tag ${l.tag}`}>{l.tag}</div>
            <div className="l-msg" dangerouslySetInnerHTML={{__html: highlight(l.msg)}}></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function highlight(msg) {
  return String(msg)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/([A-Z][A-Z0-9_]*\.[A-Z0-9_]+)/g, '<span class="tag">$1</span>')
    .replace(/"([^"]+)"/g, '"<span class="hi">$1</span>"');
}

/* ---------- Modals ---------- */
function MsgModal({ data, onResolve }) {
  if (!data) return null;
  const { type, config, selections } = data;
  const ico = type === 'alarm' ? Icon.alarm : type === 'guidance' ? Icon.guide : type === 'coach' ? Icon.coach : type === 'error' ? Icon.warn : Icon.confirm;
  const typeLabel = type === 'alarm' ? 'ALARM MESSAGE' : type === 'guidance' ? 'GUIDANCE' : type === 'coach' ? 'COACH ADVISORY' : type === 'error' ? 'ERROR' : 'CONFIRMATION';

  return (
    <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && type !== 'confirm' && onResolve(true)}>
      <div className={`modal ${type}`}>
        <div className="modal-head">
          <div className="mh-ico">{ico}</div>
          <div>
            <div className="mh-type">{typeLabel}</div>
            <div className="mh-title">{config.title || (type === 'alarm' ? `⚠ ${config.severity || ''} ALARM` : type === 'guidance' ? 'แจ้งให้ทราบ' : type === 'coach' ? 'คำแนะนำจาก Coach' : 'กรุณายืนยัน')}</div>
          </div>
        </div>
        <div className="modal-body">
          <div>{config.message}</div>
          {config.detail && <div className="m-detail">{config.detail}</div>}
          {selections && (
            <div className="m-selection">
              {selections.map((s, i) => (
                <button key={i} onClick={() => onResolve(s)}>{s}</button>
              ))}
            </div>
          )}
        </div>
        {!selections && (
          <div className="modal-foot">
            {type === 'confirm' && <button onClick={() => onResolve(false)}>ยกเลิก</button>}
            <button className="primary" onClick={() => onResolve(true)}>
              {type === 'alarm' ? 'รับทราบ' : type === 'guidance' ? 'OK' : type === 'coach' ? 'เข้าใจแล้ว' : 'ยืนยัน'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}
